  rGrad.addColorStop(1,   '#2E1E0E');
  ctx.fillStyle = rGrad;

  ctx.beginPath();
  ctx.moveTo(sx, by);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(180,140,80,0.45)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx, by);
  for (let i = 1; i < pts.length - 2; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
  ctx.lineWidth = 1;
}

function drawCaveRock(sx, sy, pw, ph_h, wx) {
  const seed = Math.floor(wx / 10);

  /* в”Җв”Җ Corpo principal da rocha (bloco escuro) в”Җв”Җ */
  const rg = ctx.createLinearGradient(sx, sy, sx, sy + ph_h);
  rg.addColorStop(0,   '#5D3A1A');
  rg.addColorStop(0.35,'#3E2008');
  rg.addColorStop(1,   '#1A0A00');
  ctx.fillStyle = rg;

  /* Topo irregular com pontos */
  const cols = Math.max(4, Math.floor(pw / 22));
  ctx.beginPath();
  ctx.moveTo(sx, sy + ph_h);               /* canto inf-esq */
  ctx.lineTo(sx, sy + ph_h * 0.35);        /* sobe lateral esq */

  /* borda superior ondulada */
  for (let i = 0; i <= cols; i++) {
    const frac = i / cols;
    const rx   = sx + frac * pw;
    const bump = 8 + ((seed * 5 + i * 11) % 16);
    const up   = (seed + i) % 2 === 0;
    ctx.lineTo(rx, sy + (up ? 0 : bump));
  }

  ctx.lineTo(sx + pw, sy + ph_h * 0.35);   /* desce lateral dir */
  ctx.lineTo(sx + pw, sy + ph_h);           /* canto inf-dir */
  ctx.closePath();
  ctx.fill();

  /* в”Җв”Җ Brilho superior (highlight) в”Җв”Җ */
  ctx.fillStyle = 'rgba(160,100,40,0.30)';
  ctx.beginPath();
  ctx.moveTo(sx, sy + ph_h * 0.35);
  for (let i = 0; i <= cols; i++) {
    const frac = i / cols;
    const rx   = sx + frac * pw;
    const bump = 8 + ((seed * 5 + i * 11) % 16);
    const up   = (seed + i) % 2 === 0;
    const ty   = sy + (up ? 0 : bump);
    ctx.lineTo(rx, ty + 10);
  }
  ctx.lineTo(sx + pw, sy + ph_h * 0.35);
  ctx.closePath();
  ctx.fill();

  /* в”Җв”Җ Sombra lateral direita в”Җв”Җ */
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(sx + pw - pw * 0.18, sy + 4, pw * 0.18, ph_h - 4);

  /* в”Җв”Җ Faixa de terra/musgo no topo в”Җв”Җ */
  ctx.fillStyle = '#4A2A0A';
  for (let i = 0; i <= cols; i++) {
    const frac = i / cols;
    const rx   = sx + frac * pw;
    const bump = 8 + ((seed * 5 + i * 11) % 16);
    const up   = (seed + i) % 2 === 0;
    const ty   = sy + (up ? 0 : bump);
    if (i < cols) {
      const rx2   = sx + (i + 1) / cols * pw;
      const bump2 = 8 + ((seed * 5 + (i+1) * 11) % 16);
      const up2   = (seed + i + 1) % 2 === 0;
      const ty2   = sy + (up2 ? 0 : bump2);
      ctx.fillRect(rx, ty, rx2 - rx, 5);
    }
  }

  /* в”Җв”Җ Estalactites na base (pedras apontando para baixo) в”Җв”Җ */
  const stalCols = Math.max(2, Math.floor(pw / 40));
  for (let i = 0; i < stalCols; i++) {
    const frac = (i + 0.5) / stalCols;
    const rx   = sx + frac * pw;
    const slen = 12 + ((seed * 3 + i * 17) % 18);
    const sw2  = 9  + ((seed + i * 7) % 8);
    ctx.fillStyle = '#2A1200';
    ctx.beginPath();
    ctx.moveTo(rx - sw2/2, sy + ph_h);
    ctx.lineTo(rx + sw2/2, sy + ph_h);
    ctx.lineTo(rx, sy + ph_h + slen);
    ctx.closePath();
    ctx.fill();
    /* brilho na estalactite */
    ctx.fillStyle = 'rgba(120,70,20,0.30)';
    ctx.beginPath();
    ctx.moveTo(rx - sw2/2, sy + ph_h);
    ctx.lineTo(rx - sw2/4, sy + ph_h);
    ctx.lineTo(rx - sw2/8, sy + ph_h + slen * 0.5);
    ctx.closePath();
    ctx.fill();
  }

  /* в”Җв”Җ Veios de minerais na rocha в”Җв”Җ */
  ctx.strokeStyle = 'rgba(180,120,50,0.18)';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const vx = sx + pw * (0.2 + i * 0.28);
    ctx.beginPath();
    ctx.moveTo(vx, sy + ph_h * 0.2);
    ctx.bezierCurveTo(vx + 6, sy + ph_h * 0.4, vx - 4, sy + ph_h * 0.6, vx + 3, sy + ph_h * 0.85);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
}

function drawPlatforms(){
  const ph=PHASES[currentPhase];
  for (const p of platforms) {
    const sx=p.x-cam.x;
    if(sx+p.w<-5||sx>canvas.width+5) continue;

    if (currentPhase === 0) {
      drawRockyIsland(sx, p.y, p.w, p.h, p.x);
    } else if (currentPhase === 1) {
      /* в”Җв”Җ Fase 2: Rochas de caverna в”Җв”Җ */
      drawCaveRock(sx, p.y, p.w, p.h, p.x);
    } else if(p.h>30){
      ctx.fillStyle=ph.groundTop; ctx.fillRect(sx,p.y,p.w,14);
      ctx.fillStyle=ph.groundMid; ctx.fillRect(sx,p.y+14,p.w,p.h-14);
      for(let gx=sx;gx<sx+p.w;gx+=20) ctx.fillRect(gx,p.y+14,1,p.h-14);
    } else {
      ctx.fillStyle=ph.platMid; ctx.fillRect(sx,p.y,p.w,p.h);
      ctx.fillStyle=ph.platTop; ctx.fillRect(sx,p.y,p.w,5);
      ctx.fillStyle=ph.platBot; ctx.fillRect(sx,p.y+p.h-4,p.w,4);
      for(let px=sx+24;px<sx+p.w;px+=24) ctx.fillRect(px,p.y,2,p.h);
    }
  }
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DRAW FLAG
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawFlag(){
  const sx=flag.x-cam.x;
  if(sx<-40||sx>canvas.width+40) return;
  ctx.fillStyle='#aaa'; ctx.fillRect(sx+12,355,5,105);
  const wave=Math.sin(gf*.08)*5;
  ctx.fillStyle='#F9A825';
  ctx.beginPath(); ctx.moveTo(sx+17,357); ctx.lineTo(sx+44+wave,368); ctx.lineTo(sx+17,379); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#E65100'; ctx.font='bold 9px Arial'; ctx.textAlign='left';
  ctx.fillText('META',sx+18,377);
  // Glow
  ctx.fillStyle='rgba(249,168,37,.18)';
  ctx.beginPath(); ctx.arc(sx+16,360,18,0,Math.PI*2); ctx.fill();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DRAW PLAYER
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* в”Җв”Җ Spritesheets por animaГ§ГЈo в”Җв”Җ */
const spriteMale = new Image(); spriteMale.src = 'player_male.png';

const SMALE = {
  idle: { img: new Image(), cols:5, rows:5, fw:256, fh:256, frames:25 },
  walk: { img: new Image(), cols:5, rows:5, fw:256, fh:256, frames:25 },
  jump: { img: new Image(), cols:5, rows:5, fw:256, fh:256, frames:25 },
};
SMALE.idle.img.src = 'male_idle.png';
SMALE.walk.img.src = 'male_walk.png';
SMALE.jump.img.src = 'male_jump.png';

const SPRITE_MALE_FW = 256;
const SPRITE_MALE_FH = 256;
const SPRITE_MALE_MAP = {
  idle:   { start:0, frames:2 },
  walk:   { start:2, frames:4 },
  jump:   { start:6, frames:1 },
  attack: { start:7, frames:4 },
  power:  { start:7, frames:4 },
};

function drawPlayer(){
  const sx=player.x-cam.x, sy=player.y;
  if(player.invincible>0 && Math.floor(player.invincible/5)%2) return;

  // Power aura
  if (player.power===player.maxPower || player.powerTimer>0) {
    const pulse=Math.sin(gf*.18)*.4+.7;
    const col=player.powerTimer>0?'rgba(255,200,0,':'rgba(100,200,255,';
    ctx.save(); ctx.translate(sx+player.w/2, sy+player.h/2);
    for(let i=0;i<3;i++){
      ctx.globalAlpha=(pulse-.15*i)*.5; ctx.strokeStyle=col+'1)'; ctx.lineWidth=3-i;
      ctx.beginPath(); ctx.arc(0,0,28+i*8+Math.sin(gf*.12+i)*4,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.restore();
  }

  ctx.save();
  ctx.translate(sx+player.w/2, sy+player.h/2);
  if(player.facing===-1) ctx.scale(-1,1);
  const s=player.state, af=player.animFrame;
  const bob=s==='walk'?Math.sin(af*Math.PI/2)*2:s==='jump'?-5:0;

  if (selectedChar === 'female') {
    drawPlayerFemale(s, af, bob);
  } else {
    drawPlayerMaleSprite(s, af);
  }
  ctx.restore();
}

function drawPlayerMaleSprite(state, af) {
  /* в”Җв”Җ animaГ§ГЈo PULANDO usa male_jump.png в”Җв”Җ */
  if (state === 'jump' || state === 'fall') {
    const s = SMALE.jump;
    if (s.img.complete && s.img.naturalWidth > 0) {
      const fi  = Math.floor(gf / 2.5) % s.frames;
      const col = fi % s.cols;
      const row = Math.floor(fi / s.cols);
      const dw  = player.w * 3.2, dh = player.h * 2.4;
      ctx.drawImage(s.img,
        col * s.fw, row * s.fh, s.fw, s.fh,
        -dw/2, -dh * 0.72,
        dw, dh);
      ctx.save(); ctx.translate(14, -10); drawWeaponInHand(); ctx.restore();
      return;
    }
  }

  /* в”Җв”Җ animaГ§ГЈo ANDANDO usa male_walk.png в”Җв”Җ */
  if (state === 'walk' || state === 'run') {
    const s = SMALE.walk;
    if (s.img.complete && s.img.naturalWidth > 0) {
      const fi  = Math.floor(gf / 2.5) % s.frames;
      const col = fi % s.cols;
      const row = Math.floor(fi / s.cols);
      const srcX = col * s.fw, srcY = row * s.fh;
      const srcW = s.fw,       srcH = s.fh;
      const dw  = player.w * 3.2, dh = player.h * 2.4;
      ctx.drawImage(s.img,
        srcX, srcY, srcW, srcH,
        -dw/2, -dh * 0.72,
        dw, dh);
      ctx.save(); ctx.translate(14, -10); drawWeaponInHand(); ctx.restore();
      return;
    }
  }

  /* в”Җв”Җ animaГ§ГЈo PARADO usa male_idle.png в”Җв”Җ */
  if (state === 'idle') {
    const s = SMALE.idle;
    if (s.img.complete && s.img.naturalWidth > 0) {
      const fi  = Math.floor(gf / 3) % s.frames;   // troca frame a cada 3 ticks
      const col = fi % s.cols;
      const row = Math.floor(fi / s.cols);
      const dw  = player.w * 3.2, dh = player.h * 2.4;
      ctx.drawImage(s.img,
        col * s.fw, row * s.fh, s.fw, s.fh,
        -dw/2, -dh * 0.72,
        dw, dh);
      /* arma */
      ctx.save(); ctx.translate(14, -10); drawWeaponInHand(); ctx.restore();
      return;
    }
  }

  /* в”Җв”Җ outras poses usam spritesheet horizontal (player_male.png) в”Җв”Җ */
  if (spriteMale.complete && spriteMale.naturalWidth > 0) {
    const map = SPRITE_MALE_MAP[state] || SPRITE_MALE_MAP.idle;
    const fi  = map.start + (af % map.frames);
    const dw  = player.w * 3.2, dh = player.h * 2.0;
    ctx.drawImage(spriteMale,
      fi * SPRITE_MALE_FW, 0, SPRITE_MALE_FW, SPRITE_MALE_FH,
      -dw/2, -dh * 0.72,
      dw, dh);
    const isAtk = (state === 'attack' || state === 'power');
    ctx.save(); ctx.translate(14, isAtk ? -16 : -10); drawWeaponInHand(); ctx.restore();
    return;
  }

  /* fallback cГіdigo */
  drawPlayerMale(state, af, 0);
}

function drawPlayerMale(s, af, bob) {
  const C = PLAYER_COLORS;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(0,24+bob,14,4,0,0,Math.PI*2); ctx.fill();
  // Legs
  if(s==='walk'){
    const sw=Math.sin(af*Math.PI/2)*10;
    ctx.fillStyle=C.pants; ctx.fillRect(-9,10+bob,8,16-sw*.4); ctx.fillRect(1,10+bob,8,16+sw*.4);
    ctx.fillStyle='#6D4C41'; ctx.fillRect(-11,25+bob-sw*.4,11,7); ctx.fillRect(1,25+bob+sw*.4,11,7);
  } else if(s==='jump'){
    ctx.fillStyle=C.pants; ctx.fillRect(-10,12+bob,8,12); ctx.fillRect(2,8+bob,8,12);
    ctx.fillStyle='#6D4C41'; ctx.fillRect(-12,23+bob,11,7); ctx.fillRect(2,19+bob,11,7);
  } else {
    ctx.fillStyle=C.pants; ctx.fillRect(-9,10+bob,8,16); ctx.fillRect(1,10+bob,8,16);
    ctx.fillStyle='#6D4C41'; ctx.fillRect(-11,25+bob,11,7); ctx.fillRect(1,25+bob,11,7);
  }
  // Body
  ctx.fillStyle=C.shirt; ctx.beginPath(); ctx.roundRect(-12,-8+bob,24,20,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)'; ctx.beginPath(); ctx.roundRect(-12,-8+bob,24,6,[5,5,0,0]); ctx.fill();
  ctx.fillStyle=C.shirt+'cc'; ctx.fillRect(-12,9+bob,24,3);
  ctx.fillStyle='#F9A825'; ctx.beginPath(); ctx.roundRect(-2,-4+bob,5,5,2); ctx.fill();
  // Arms
  if(s==='attack'){
    const p = 1 - player.attackTimer/18;
    const swingAng = -0.7 + Math.sin(p * Math.PI) * 1.55;
    ctx.save();
    ctx.translate(14, -4+bob); ctx.rotate(swingAng);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,16,4); ctx.fill();
    ctx.fillStyle='#FF8A65'; ctx.beginPath(); ctx.roundRect(-5,14,11,10,5); ctx.fill();
    ctx.save(); ctx.translate(0,19); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save();
    ctx.translate(-14, -4+bob); ctx.rotate(-swingAng*0.28);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.restore();
  } else if(s==='walk'){
    const sw=Math.sin(af*Math.PI/2)*6;
    ctx.save(); ctx.translate(14,-5+bob+sw);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,14,4); ctx.fill();
    ctx.save(); ctx.translate(0,14); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save(); ctx.translate(-14,-5+bob-sw);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,14,4); ctx.fill();
    ctx.restore();
  } else {
    ctx.save(); ctx.translate(14,-5+bob);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,14,4); ctx.fill();
    ctx.save(); ctx.translate(0,14); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save(); ctx.translate(-14,-5+bob);
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-4,0,8,14,4); ctx.fill();
    ctx.restore();
  }
  // Head
  ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-11,-26,22,20,8); ctx.fill();
  ctx.fillStyle=C.hair; ctx.beginPath(); ctx.roundRect(-11,-26,22,8,[8,8,0,0]); ctx.fill(); ctx.fillRect(-13,-22,4,6);
  ctx.fillStyle='#fff'; ctx.fillRect(-7,-20,5,5); ctx.fillRect(2,-20,5,5);
  ctx.fillStyle='#263238'; ctx.fillRect(-6,-19,3,4); ctx.fillRect(3,-19,3,4);
  ctx.fillStyle='#fff'; ctx.fillRect(-5,-19,1,2); ctx.fillRect(4,-19,1,2);
  ctx.fillStyle='#C62828';
  if(s==='jump'){ ctx.beginPath(); ctx.arc(0,-10,4,0,Math.PI); ctx.fill(); }
  else ctx.fillRect(-4,-10,9,2);
  ctx.fillStyle=C.shirt; ctx.fillRect(-13,-28,26,5); ctx.fillRect(-9,-37,18,11);
  ctx.fillStyle='#fff'; ctx.fillRect(-1,-37,9,4);
}

function drawPlayerFemale(s, af, bob) {
  const C = PLAYER_COLORS;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,.22)';
  ctx.beginPath(); ctx.ellipse(0,24+bob,14,4,0,0,Math.PI*2); ctx.fill();
  // Legs (antes da saia para ficarem por baixo)
  if(s==='walk'){
    const sw=Math.sin(af*Math.PI/2)*9;
    ctx.fillStyle=C.fskin; ctx.fillRect(-9,18+bob-sw*.3,8,15); ctx.fillRect(1,18+bob+sw*.3,8,15);
    ctx.fillStyle='#EC407A'; ctx.beginPath(); ctx.roundRect(-11,32+bob-sw*.3,11,6,[0,0,4,4]); ctx.fill(); ctx.beginPath(); ctx.roundRect(1,32+bob+sw*.3,11,6,[0,0,4,4]); ctx.fill();
  } else if(s==='jump'){
    ctx.fillStyle=C.fskin; ctx.fillRect(-10,18+bob,8,12); ctx.fillRect(2,14+bob,8,12);
    ctx.fillStyle='#EC407A'; ctx.beginPath(); ctx.roundRect(-12,30+bob,11,6,[0,0,4,4]); ctx.fill(); ctx.beginPath(); ctx.roundRect(2,26+bob,11,6,[0,0,4,4]); ctx.fill();
  } else {
    ctx.fillStyle=C.fskin; ctx.fillRect(-9,18+bob,8,15); ctx.fillRect(1,18+bob,8,15);
    ctx.fillStyle='#EC407A'; ctx.beginPath(); ctx.roundRect(-11,32+bob,11,6,[0,0,4,4]); ctx.fill(); ctx.beginPath(); ctx.roundRect(1,32+bob,11,6,[0,0,4,4]); ctx.fill();
  }
  // Saia (por cima das pernas)
  ctx.fillStyle=C.fskirt;
  ctx.beginPath(); ctx.moveTo(-13,10+bob); ctx.lineTo(13,10+bob); ctx.lineTo(17,26+bob); ctx.lineTo(-17,26+bob); ctx.closePath(); ctx.fill();
  ctx.fillStyle=C.fskirt+'bb'; ctx.fillRect(-13,10+bob,26,6);
  // Body
  ctx.fillStyle=C.fshirt; ctx.beginPath(); ctx.roundRect(-12,-8+bob,24,20,5); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.20)'; ctx.beginPath(); ctx.roundRect(-12,-8+bob,24,7,[5,5,0,0]); ctx.fill();
  ctx.fillStyle=C.fshirt+'aa'; ctx.fillRect(-12,9+bob,24,3);
  // LaГ§o
  ctx.fillStyle=C.fskin;
  ctx.beginPath(); ctx.moveTo(-7,-6+bob); ctx.bezierCurveTo(-14,-12+bob,-14,-2+bob,-7,-4+bob); ctx.fill();
  ctx.beginPath(); ctx.moveTo(7,-6+bob); ctx.bezierCurveTo(14,-12+bob,14,-2+bob,7,-4+bob); ctx.fill();
  ctx.beginPath(); ctx.arc(0,-5+bob,3.5,0,Math.PI*2); ctx.fill();
  // Arms
  if(s==='attack'){
    const p = 1 - player.attackTimer/18;
    const swingAng = -0.7 + Math.sin(p * Math.PI) * 1.55;
    ctx.save();
    ctx.translate(13, -4+bob); ctx.rotate(swingAng);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,15,4); ctx.fill();
    ctx.fillStyle=C.fhair+'66'; ctx.beginPath(); ctx.roundRect(-4,13,10,9,5); ctx.fill();
    ctx.save(); ctx.translate(0,18); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save();
    ctx.translate(-13, -4+bob); ctx.rotate(-swingAng*0.28);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.restore();
  } else if(s==='walk'){
    const sw=Math.sin(af*Math.PI/2)*5;
    ctx.save(); ctx.translate(13,-5+bob+sw);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.save(); ctx.translate(0,13); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save(); ctx.translate(-13,-5+bob-sw);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.restore();
  } else {
    ctx.save(); ctx.translate(13,-5+bob);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.save(); ctx.translate(0,13); drawWeaponInHand(); ctx.restore();
    ctx.restore();
    ctx.save(); ctx.translate(-13,-5+bob);
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-4,0,8,13,4); ctx.fill();
    ctx.restore();
  }
  // CabeГ§a
  ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-11,-28,22,22,9); ctx.fill();
  // Cabelo
  ctx.fillStyle=C.fhair; ctx.fillRect(-13,-32,26,8);
  ctx.fillRect(-14,-24,5,14); ctx.fillRect(9,-24,5,14);
  ctx.beginPath(); ctx.arc(-9,-25,7,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-25,7,Math.PI,0); ctx.fill();
  // Rabo de cavalo (direita)
  ctx.fillStyle=C.fhair+'cc';
  ctx.beginPath(); ctx.moveTo(14,-24); ctx.bezierCurveTo(22,-20,24,-10,18,-2); ctx.lineTo(14,-4); ctx.bezierCurveTo(18,-12,16,-20,12,-24); ctx.closePath(); ctx.fill();
  // Olhos
  ctx.fillStyle='#fff'; ctx.fillRect(-8,-22,5,5); ctx.fillRect(3,-22,5,5);
  ctx.fillStyle='#6A1B9A'; ctx.fillRect(-7,-21,3,3); ctx.fillRect(4,-21,3,3);
  ctx.fillStyle='#fff'; ctx.fillRect(-6,-21,1,2); ctx.fillRect(5,-21,1,2);
  // CГӯlios
  ctx.strokeStyle=C.fhair; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-8,-19); ctx.lineTo(-11,-16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-19); ctx.lineTo(11,-16); ctx.stroke();
  ctx.lineWidth=1;
  // Boca
  if(s==='jump'){ ctx.fillStyle=C.fshirt; ctx.beginPath(); ctx.arc(0,-11,3,0,Math.PI); ctx.fill(); }
  else { ctx.fillStyle=C.fshirt; ctx.beginPath(); ctx.arc(0,-11,3,0,Math.PI); ctx.fill(); }
}

/* в”Җв”Җ Arma na mГЈo вҖ” chamada dentro do contexto jГЎ posicionado na mГЈo в”Җв”Җ */
function drawWeaponInHand() {
  const w = selectedWeapon;
  ctx.rotate(Math.PI / 4);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  if (w === 'scythe') {
    /* в”Җв”Җ ROГҮADEIRA в”Җв”Җ */
    /* cabo com gradiente */
    const cg = ctx.createLinearGradient(0,4,0,-24);
    cg.addColorStop(0,'#5D4037'); cg.addColorStop(0.5,'#8D6E63'); cg.addColorStop(1,'#4E342E');
    ctx.strokeStyle=cg; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-24); ctx.stroke();
    /* detalhe enrolado no cabo */
    ctx.strokeStyle='#FFD54F'; ctx.lineWidth=1.5;
    for(let i=0;i<3;i++){
      ctx.beginPath(); ctx.moveTo(-2,-6-i*5); ctx.lineTo(2,-8-i*5); ctx.stroke();
    }
    /* lГўmina principal */
    const lg = ctx.createLinearGradient(0,-24,20,-4);
    lg.addColorStop(0,'#B0BEC5'); lg.addColorStop(0.4,'#ECEFF1'); lg.addColorStop(1,'#607D8B');
    ctx.strokeStyle=lg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(0,-24); ctx.bezierCurveTo(22,-36,26,-10,10,-5); ctx.stroke();
    /* fio brilhante */
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-24); ctx.bezierCurveTo(18,-33,23,-13,10,-6); ctx.stroke();
    /* ponta da lГўmina */
    ctx.fillStyle='#CFD8DC';
    ctx.beginPath(); ctx.arc(10,-5,2.5,0,Math.PI*2); ctx.fill();
    /* brilho azulado */
    ctx.fillStyle='rgba(100,180,255,0.35)';
    ctx.beginPath(); ctx.moveTo(0,-24); ctx.bezierCurveTo(14,-30,18,-14,8,-8); ctx.closePath(); ctx.fill();

  } else if (w === 'axe') {
    /* в”Җв”Җ MACHADO в”Җв”Җ */
    const cg = ctx.createLinearGradient(0,4,0,-22);
    cg.addColorStop(0,'#4E342E'); cg.addColorStop(0.6,'#795548'); cg.addColorStop(1,'#5D4037');
    ctx.strokeStyle=cg; ctx.lineWidth=4.5;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-22); ctx.stroke();
    /* rebites no cabo */
    ctx.fillStyle='#FFD54F';
    [- 4,-12,-20].forEach(y=>{ ctx.beginPath(); ctx.arc(0,y,2,0,Math.PI*2); ctx.fill(); });
    /* cabeГ§a do machado вҖ” corpo */
    const ag = ctx.createLinearGradient(-4,-32,16,-8);
    ag.addColorStop(0,'#78909C'); ag.addColorStop(0.5,'#CFD8DC'); ag.addColorStop(1,'#546E7A');
    ctx.fillStyle=ag;
    ctx.beginPath();
    ctx.moveTo(-3,-16); ctx.lineTo(-4,-28);
    ctx.bezierCurveTo(2,-34,18,-30,17,-18);
    ctx.bezierCurveTo(17,-10,3,-8,-3,-16);
    ctx.closePath(); ctx.fill();
    /* fio da lГўmina */
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-4,-28); ctx.bezierCurveTo(2,-34,18,-30,17,-18);
    ctx.stroke();
    /* reflexo interno */
    ctx.fillStyle='rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.moveTo(-1,-18); ctx.lineTo(-2,-26);
    ctx.bezierCurveTo(2,-30,12,-27,12,-20);
    ctx.bezierCurveTo(12,-14,2,-12,-1,-18);
    ctx.closePath(); ctx.fill();
    /* sangria central */
    ctx.strokeStyle='rgba(80,100,120,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(5,-26); ctx.lineTo(6,-12); ctx.stroke();

  } else {
    /* в”Җв”Җ ESPADA в”Җв”Җ */
    /* punho */
    const hg = ctx.createLinearGradient(-2,4,-2,-4);
    hg.addColorStop(0,'#4E342E'); hg.addColorStop(1,'#8D6E63');
    ctx.strokeStyle=hg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-4); ctx.stroke();
    /* gema na empunhadura */
    ctx.fillStyle='#E53935';
    ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,150,150,0.7)';
    ctx.beginPath(); ctx.arc(-1,-1,1.2,0,Math.PI*2); ctx.fill();
    /* guarda dourada */
    const gg = ctx.createLinearGradient(-10,-4,10,-4);
    gg.addColorStop(0,'#F57F17'); gg.addColorStop(0.5,'#FFD54F'); gg.addColorStop(1,'#F57F17');
    ctx.strokeStyle=gg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-10,-4); ctx.lineTo(10,-4); ctx.stroke();
    /* pontas da guarda */
    ctx.fillStyle='#FFD54F';
    ctx.beginPath(); ctx.arc(-10,-4,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(10,-4,3,0,Math.PI*2); ctx.fill();
    /* lГўmina */
    const sg = ctx.createLinearGradient(-3,-4,3,-28);
    sg.addColorStop(0,'#90A4AE'); sg.addColorStop(0.5,'#ECEFF1'); sg.addColorStop(1,'#B0BEC5');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(-3.5,-4); ctx.lineTo(3.5,-4); ctx.lineTo(0,-28); ctx.closePath(); ctx.fill();
    /* fio central */
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(0.5,-4); ctx.lineTo(0,-28); ctx.stroke();
    /* brilho lateral */
    ctx.strokeStyle='rgba(180,220,255,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-2,-6); ctx.lineTo(-1,-26); ctx.stroke();
  }
  ctx.lineCap='butt';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DRAW ENEMIES
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawEnemy(e){
  const sx=e.x-cam.x, sy=e.y;
  if(sx+e.w<-30||sx>canvas.width+30) return;

  if(e.deadTimer>=0){
    const prog=e.deadTimer/45;
    ctx.globalAlpha=1-prog;
    ctx.save(); ctx.translate(sx+e.w/2,sy+e.h/2);
    ctx.rotate(prog*Math.PI*1.5); ctx.scale(1+prog*.6,1+prog*.6);
    drawEnemyShape(e,0,0);
    ctx.restore(); ctx.globalAlpha=1; return;
  }

  // Hurt flash
  if(e.hurtTimer>0 && Math.floor(e.hurtTimer/3)%2){
    ctx.save(); ctx.translate(sx+e.w/2,sy+e.h/2);
    if(e.facing===1) ctx.scale(-1,1);
    ctx.globalAlpha=.55; ctx.fillStyle='#fff';
    ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
    ctx.globalAlpha=1; ctx.restore();
  }

  ctx.save(); ctx.translate(sx+e.w/2,sy+e.h/2);
  if(e.facing===1) ctx.scale(-1,1);
  drawEnemyShape(e,0,0);
  ctx.restore();

  // HP dots above enemy вҖ” mais acima da cabeГ§a, sem mostrar para o boss
  if(e.maxHp>1 && e.type!=='boss'){
    for(let i=0;i<e.maxHp;i++){
      ctx.fillStyle = i<e.hp ? '#2ECC71' : '#555';
      ctx.beginPath(); ctx.arc(sx+6+i*11, sy-22, 4, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='#000'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(sx+6+i*11, sy-22, 4, 0, Math.PI*2); ctx.stroke();
    }
  }
}

function drawEnemyShape(e,ox,oy){
  const t=e.type;
  if     (t==='goblin')   drawGoblin(e,ox,oy);
  else if(t==='demon')    drawDemon(e,ox,oy);
  else if(t==='heavy')    drawHeavy(e,ox,oy);
  else if(t==='bat')      drawBat(e,ox,oy);
  else if(t==='slime')    drawSlime(e,ox,oy);
  else if(t==='mushroom') drawMushroom(e,ox,oy);
  else if(t==='spider')   drawSpider(e,ox,oy);
  else if(t==='skeleton') drawSkeleton(e,ox,oy);
  else if(t==='firebird') drawFirebird(e,ox,oy);
  else if(t==='yeti')     drawYeti(e,ox,oy);
  else if(t==='alien')    drawAlien(e,ox,oy);
  else if(t==='robot')    drawRobot(e,ox,oy);
  else if(t==='monster')  drawMonster(e,ox,oy);
  else if(t==='giant')    drawGiant(e,ox,oy);
  else if(t==='boss')     drawBoss(e,ox,oy);
  else if(t==='archer')   drawArcher(e,ox,oy);
}

/* в”Җв”Җ Calcula Гўngulo de swing do braГ§o ao atacar в”Җв”Җ
   Retorna 0 quando nГЈo ataca, sobe para PI*0.8 no pico e retorna.
   facing: 1=direita, -1=esquerda */
function eAtkSwing(e) {
  if (!e.attackTimer || e.attackTimer <= 0) return 0;
  const p = 1 - e.attackTimer / 18;           // 0вҶ’1 durante o ataque
  return Math.sin(p * Math.PI) * 1.4;          // arco suave de swing
}

/* в”Җв”Җ Arqueiro в”Җв”Җ */
function drawArcher(e,ox,oy){
  const af   = e.animFrame;
  const bob  = Math.sin(af * 0.06) * 1.2;
  const shot = eAtkSwing(e);          // 0вҶ’1вҶ’0 ao disparar
  const f    = e.facing;              // 1=dir, -1=esq

  /* ГЎngulo de mira: aponta para o jogador */
  const aimDX = (player.x+player.w/2) - ox;
  const aimDY = (player.y+player.h/2) - (oy - 8 + bob);
  const aimA  = Math.atan2(aimDY, aimDX);   // Гўngulo real de mira
  /* limita a mira a Вұ60В° horizontal */
  const clampedAim = Math.max(-Math.PI*0.55, Math.min(Math.PI*0.55, aimA * f)) * f;

  /* tensГЈo da corda: aumenta conforme bowCooldown regride */
  const bowCD  = e.bowCooldown || 0;
  const charge = bowCD > 20 ? Math.min(1, (120 - bowCD) / 80) : 0;
  const pull   = charge * 6 + shot * 4;   // px de recuo da corda

  /* в”Җв”Җ sombra в”Җв”Җ */
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(ox,oy+32+bob,12,4,0,0,Math.PI*2); ctx.fill();

  /* в”Җв”Җ pernas com caminhada в”Җв”Җ */
  const walkL = e.state==='patrol'||e.state==='chase' ? Math.sin(af*0.18)*8 : 0;
  ctx.fillStyle='#4E342E';
  ctx.beginPath(); ctx.roundRect(ox-8, oy+10+bob+walkL,  7, 20, [0,0,3,3]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(ox+1, oy+10+bob-walkL,  7, 20, [0,0,3,3]); ctx.fill();
  /* botas */
  const bootGrad = ctx.createLinearGradient(ox-10,oy+28,ox+10,oy+32);
  bootGrad.addColorStop(0,'#4E342E'); bootGrad.addColorStop(1,'#3E2723');
  ctx.fillStyle=bootGrad;
  ctx.beginPath(); ctx.roundRect(ox-9,  oy+26+bob+walkL, 10, 8, [0,0,4,4]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(ox,    oy+26+bob-walkL, 10, 8, [0,0,4,4]); ctx.fill();
  /* detalhe bota */
  ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ox-9,oy+27+bob+walkL); ctx.lineTo(ox+1,oy+27+bob+walkL); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox,  oy+27+bob-walkL); ctx.lineTo(ox+10,oy+27+bob-walkL); ctx.stroke();

  /* в”Җв”Җ corpo в”Җв”Җ */
  const bodyG = ctx.createLinearGradient(ox-11,oy-14+bob,ox+11,oy+14+bob);
  bodyG.addColorStop(0,'#388E3C'); bodyG.addColorStop(0.5,'#2E7D32'); bodyG.addColorStop(1,'#1B5E20');
  ctx.fillStyle=bodyG;
  ctx.beginPath(); ctx.roundRect(ox-11,oy-14+bob,22,26,6); ctx.fill();
  /* cinturГЈo */
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.roundRect(ox-11,oy+6+bob,22,6,2); ctx.fill();
  ctx.fillStyle='#FFD54F';
  ctx.beginPath(); ctx.roundRect(ox-4,oy+7+bob,8,4,2); ctx.fill();
  /* colete de couro */
  const vestG = ctx.createLinearGradient(ox-7,oy-12+bob,ox+7,oy+6+bob);
  vestG.addColorStop(0,'#A1887F'); vestG.addColorStop(1,'#6D4C41');
  ctx.fillStyle=vestG;
  ctx.beginPath(); ctx.moveTo(ox-7,oy-12+bob); ctx.lineTo(ox+7,oy-12+bob);
  ctx.lineTo(ox+5,oy+6+bob); ctx.lineTo(ox-5,oy+6+bob); ctx.closePath(); ctx.fill();
  /* linha central do colete */
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ox,oy-10+bob); ctx.lineTo(ox,oy+4+bob); ctx.stroke();
  ctx.lineWidth=1;

  /* в”Җв”Җ cabeГ§a в”Җв”Җ */
  /* pescoГ§o */
  ctx.fillStyle='#FFCC80';
  ctx.beginPath(); ctx.roundRect(ox-4,oy-17+bob,8,6,2); ctx.fill();
  /* rosto */
  const faceG = ctx.createRadialGradient(ox-f,oy-24+bob,2,ox,oy-22+bob,11);
  faceG.addColorStop(0,'#FFE0B2'); faceG.addColorStop(1,'#FFCC80');
  ctx.fillStyle=faceG;
  ctx.beginPath(); ctx.arc(ox,oy-22+bob,11,0,Math.PI*2); ctx.fill();
  /* sombra do rosto */
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.beginPath(); ctx.arc(ox+f*3,oy-20+bob,7,0,Math.PI*2); ctx.fill();

  /* capuz */
  const hoodG = ctx.createLinearGradient(ox-12,oy-34+bob,ox+12,oy-14+bob);
  hoodG.addColorStop(0,'#43A047'); hoodG.addColorStop(1,'#2E7D32');
  ctx.fillStyle=hoodG;
  ctx.beginPath();
  ctx.moveTo(ox-12,oy-22+bob);
  ctx.quadraticCurveTo(ox-13,oy-36+bob, ox,oy-36+bob);
  ctx.quadraticCurveTo(ox+13,oy-36+bob, ox+12,oy-22+bob);
  ctx.quadraticCurveTo(ox+8, oy-14+bob, ox+6,oy-14+bob);
  ctx.lineTo(ox-6,oy-14+bob);
  ctx.quadraticCurveTo(ox-8,oy-14+bob, ox-12,oy-22+bob);
  ctx.closePath(); ctx.fill();
  /* borda do capuz */
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(ox-6,oy-14+bob); ctx.quadraticCurveTo(ox,oy-11+bob,ox+6,oy-14+bob);
  ctx.stroke();
  /* ponta do capuz */
  ctx.fillStyle='#1B5E20';
  ctx.beginPath();
  ctx.moveTo(ox-2,oy-34+bob); ctx.quadraticCurveTo(ox,oy-42+bob,ox+2,oy-34+bob);
  ctx.closePath(); ctx.fill();

  /* olho */
  ctx.fillStyle='#1a0a00';
  ctx.beginPath(); ctx.ellipse(ox+f*5,oy-22+bob, 2.5,2,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath(); ctx.arc(ox+f*5+0.8,oy-23+bob, 0.8,0,Math.PI*2); ctx.fill();
  /* boca */
  ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(ox+f*2,oy-18+bob); ctx.quadraticCurveTo(ox+f*5,oy-17+bob,ox+f*7,oy-18+bob); ctx.stroke();

  /* в”Җв”Җ BraГ§os + Arco в”Җв”Җ */
  ctx.lineCap='round';

  /* posiГ§ГЈo fixa da mГЈo dianteira (ponto de ancoragem do arco) */
  const handX = ox + f*30;
  const handY = oy - 8 + bob;

  /* braГ§o traseiro (puxa a corda) вҖ” desenhado antes do arco */
  const pullBackX = ox - f*8;
  const pullBackY = oy - 10 + bob;
  const pullAng   = charge * f * 0.5 + shot * f * 1.2;
  ctx.save();
  ctx.translate(pullBackX, pullBackY);
  ctx.rotate(pullAng);
  ctx.strokeStyle='#1B5E20'; ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-f*10, 5); ctx.stroke();
  ctx.strokeStyle='#2E7D32'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(-f*10,5); ctx.lineTo(-f*7,14); ctx.stroke();
  ctx.fillStyle='#FFCC80';
  ctx.beginPath(); ctx.arc(-f*7,14,4,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* braГ§o dianteiro (segura o arco) */
  ctx.save();
  ctx.translate(ox + f*10, oy - 10 + bob);
  ctx.rotate(clampedAim * 0.4);
  ctx.strokeStyle='#2E7D32'; ctx.lineWidth=7;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(f*12, 3); ctx.stroke();
  ctx.strokeStyle='#388E3C'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.moveTo(f*12,3); ctx.lineTo(f*20, 2); ctx.stroke();
  ctx.fillStyle='#5D4037';
  ctx.beginPath(); ctx.arc(f*20,2,5,0,Math.PI*2); ctx.fill();
  ctx.restore();

  /* в”Җв”Җ ARCO centrado na mГЈo dianteira в”Җв”Җ */
  /* Гўngulo do arco: perpendicular Г  direГ§ГЈo de mira */
  const bowAng = clampedAim + Math.PI/2;
  ctx.save();
  ctx.translate(handX, handY);
  ctx.rotate(bowAng);
  const bowG = ctx.createLinearGradient(-4,0,4,0);
  bowG.addColorStop(0,'#6D4C41'); bowG.addColorStop(0.5,'#A1887F'); bowG.addColorStop(1,'#6D4C41');
  ctx.strokeStyle=bowG; ctx.lineWidth=4.5; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(0,-20);
  ctx.bezierCurveTo(f*10,-13, f*10,13, 0,20);
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,-18); ctx.bezierCurveTo(f*6,-10, f*6,10, 0,18); ctx.stroke();
  ctx.fillStyle='#4E342E';
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  /* corda */
  const midX = -f*(2+pull);
  ctx.strokeStyle='rgba(220,200,140,0.95)'; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.quadraticCurveTo(midX,0, 0,20); ctx.stroke();
  ctx.lineCap='butt'; ctx.lineWidth=1;
  ctx.restore();

  /* в”Җв”Җ flecha no arco (em coordenadas de mundo, apontando para o jogador) в”Җв”Җ */
  if (charge > 0.05) {
    const aAlpha = Math.min(1, charge * 2);
    ctx.globalAlpha = aAlpha;
    ctx.save();
    /* posiciona no centro do arco e gira para apontar ao jogador */
    ctx.translate(handX, handY);
    ctx.rotate(clampedAim);   /* clampedAim jГЎ Г© o Гўngulo mundial em direГ§ГЈo ao jogador */
    /* haste: ponta em +x (frente), penas em -x (trГЎs) */
    ctx.strokeStyle='#8D6E63'; ctx.lineWidth=2.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(16,0); ctx.stroke();
    /* ponta metГЎlica */
    ctx.fillStyle='#90A4AE';
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(10,3); ctx.lineTo(10,-3); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ECEFF1';
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(12,2); ctx.lineTo(12,-2); ctx.closePath(); ctx.fill();
    /* penas */
    ctx.strokeStyle='#EF5350'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-16,-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-16, 5); ctx.stroke();
    ctx.strokeStyle='rgba(255,160,0,0.7)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-14,-3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-14, 3); ctx.stroke();
    ctx.lineCap='butt'; ctx.lineWidth=1;
    ctx.restore();
    ctx.globalAlpha=1;
  }

  /* в”Җв”Җ Aljava nas costas в”Җв”Җ */
  const qx = ox - f*8, qy = oy-8+bob;
  ctx.fillStyle='#8D6E63';
  ctx.beginPath(); ctx.roundRect(qx-4,qy,8,20,[3,3,2,2]); ctx.fill();
  ctx.fillStyle='#6D4C41';
  ctx.beginPath(); ctx.roundRect(qx-4,qy,8,5,[3,3,0,0]); ctx.fill();
  /* flechas na aljava */
  ctx.strokeStyle='#8D6E63'; ctx.lineWidth=2; ctx.lineCap='round';
  for(let i=0;i<3;i++){
    ctx.strokeStyle=i===0?'#8D6E63':i===1?'#795548':'#6D4C41';
    ctx.beginPath(); ctx.moveTo(qx-2+i*2,qy); ctx.lineTo(qx-2+i*2,qy-9); ctx.stroke();
    ctx.fillStyle='#78909C';
    ctx.beginPath(); ctx.moveTo(qx-2+i*2,qy-9); ctx.lineTo(qx-5+i*2,qy-5); ctx.lineTo(qx+1+i*2,qy-5); ctx.closePath(); ctx.fill();
  }
  ctx.lineCap='butt'; ctx.lineWidth=1;
}

/* в”Җв”Җ Goblin (pequeno, verde, rГЎpido) в”Җв”Җ */
function drawGoblin(e,ox,oy){

  // hat
  ctx.fillStyle='#4E342E'; ctx.fillRect(ox-9,oy-22,18,4); ctx.fillRect(ox-6,oy-30,12,9);

  ctx.beginPath(); ctx.moveTo(ox+6,oy-14); ctx.lineTo(ox+10,oy-24); ctx.lineTo(ox+2,oy-14); ctx.closePath(); ctx.fill();

/* в”Җв”Җ Spider / Aranha (preta, 8 pernas) в”Җв”Җ */
function drawSpider(e,ox,oy){
  const mv=e.state==='patrol'||e.state==='chase';
  const lsw=mv?Math.sin(e.animFrame*Math.PI/2)*6:0;
  ctx.fillStyle='rgba(0,0,0,.2)'; ctx.beginPath(); ctx.ellipse(ox,oy+16,13,3,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#212121'; ctx.lineWidth=2.5;
  const legs=[[-14,2,-20,-8],[-16,6,-24,2],[-15,11,-22,14],[-12,15,-18,20],
              [14,2,20,-8],[16,6,24,2],[15,11,22,14],[12,15,18,20]];
  for(let i=0;i<4;i++){
    const s=i<4?-lsw*(i%2?1:-1):lsw*(i%2?1:-1);
    const l1=legs[i],l2=legs[i+4];
    ctx.beginPath(); ctx.moveTo(ox+l1[0],oy+l1[1]+s); ctx.lineTo(ox+l1[2],oy+l1[3]+s); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+l2[0],oy+l2[1]-s); ctx.lineTo(ox+l2[2],oy+l2[3]-s); ctx.stroke();
  }
  ctx.lineWidth=1;
  ctx.fillStyle='#212121'; ctx.beginPath(); ctx.ellipse(ox,oy+7,12,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#1A1A1A'; ctx.beginPath(); ctx.ellipse(ox,oy-2,9,9,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#F44336'; ctx.beginPath(); ctx.ellipse(ox,oy+7,4,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FF5252'; ctx.beginPath(); ctx.arc(ox-4,oy-3,3,0,Math.PI*2); ctx.fill();

/* в”Җв”Җ Robot (metal, grande, Fase 5) в”Җв”Җ */
function drawRobot(e,ox,oy){
  const mv=e.state==='patrol'||e.state==='chase';
  const bob=mv?Math.sin(e.animFrame*Math.PI/2)*1.5:0;
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(ox,oy+32+bob,18,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#546E7A'; ctx.fillRect(ox-13,oy+14+bob,10,20); ctx.fillRect(ox+3,oy+14+bob,10,20);
  ctx.fillStyle='#607D8B'; ctx.fillRect(ox-14,oy+30+bob,12,8); ctx.fillRect(ox+2,oy+30+bob,12,8);
  ctx.fillStyle='#78909C'; ctx.fillRect(ox-17,oy-12+bob,34,28);
  ctx.fillStyle='#90A4AE'; ctx.fillRect(ox-17,oy-12+bob,34,7);
  ctx.fillStyle='#546E7A'; ctx.fillRect(ox-17,oy+13+bob,34,3);
  /* panel details */
  ctx.fillStyle='#455A64'; ctx.fillRect(ox-12,oy-8+bob,10,10); ctx.fillRect(ox+3,oy-8+bob,10,10);
  ctx.fillStyle='#00E5FF'; ctx.fillRect(ox-11,oy-7+bob,3,3); ctx.fillRect(ox+9,oy-7+bob,3,3);
  ctx.fillStyle='#F44336'; ctx.fillRect(ox-7,oy-7+bob,3,3); ctx.fillRect(ox+5,oy-7+bob,3,3);
  ctx.fillStyle='#76FF03'; ctx.fillRect(ox-3,oy-7+bob,6,3);
  ctx.fillStyle='#607D8B'; ctx.fillRect(ox+17,oy-14+bob,10,14); ctx.fillRect(ox-27,oy-14+bob,10,14);
  /* braГ§os do robГҙ вҖ” espada sempre no braГ§o da frente */
  const swing  = eAtkSwing(e);
  const fwd    = e.facing;
  const fwdX   = ox + fwd * 21;
  const bckX   = ox - fwd * 21;

  /* braГ§o de trГЎs (contrapeso) */
  ctx.save(); ctx.translate(bckX, oy+1+bob); ctx.rotate(fwd * swing * 0.5);
  ctx.fillStyle='#546E7A'; ctx.fillRect(-4,0,9,20);
  ctx.fillStyle='#78909C'; ctx.fillRect(-5,18,11,10); ctx.restore();

  /* braГ§o da frente + espada
     restAngle: inclinaГ§ГЈo natural para frente (nГЈo fica pendurado reto)
     sAngle: gira para frente ao atacar                                    */
  const restAngle = fwd * 0.55;
  const sAngle    = restAngle + fwd * swing * 1.4;
  ctx.save(); ctx.translate(fwdX, oy+1+bob); ctx.rotate(sAngle);

  /* braГ§o */
  ctx.fillStyle='#546E7A'; ctx.fillRect(-5,0,9,20);
  ctx.fillStyle='#78909C'; ctx.fillRect(-6,18,11,10);

  /* espada ancorada no centro do punho (y=23) */
  ctx.translate(0, 23);
  ctx.lineCap='round'; ctx.lineJoin='round';

  /* punho */
  const hg2=ctx.createLinearGradient(0,4,0,-2);
  hg2.addColorStop(0,'#4E342E'); hg2.addColorStop(1,'#8D6E63');
  ctx.strokeStyle=hg2; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-2); ctx.stroke();

  /* guarda вҖ” azul metГЎlico (espada de robГҙ) */
  const gg2=ctx.createLinearGradient(-9,-2,9,-2);
  gg2.addColorStop(0,'#1565C0'); gg2.addColorStop(0.5,'#42A5F5'); gg2.addColorStop(1,'#1565C0');
  ctx.strokeStyle=gg2; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-9,-2); ctx.lineTo(9,-2); ctx.stroke();
  ctx.fillStyle='#42A5F5';
  ctx.beginPath(); ctx.arc(-9,-2,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-2,2.5,0,Math.PI*2); ctx.fill();

  /* lГўmina */
  const sg2=ctx.createLinearGradient(-3,-2,3,-24);
  sg2.addColorStop(0,'#90A4AE'); sg2.addColorStop(0.45,'#ECEFF1'); sg2.addColorStop(1,'#B0BEC5');
  ctx.fillStyle=sg2;
  ctx.beginPath(); ctx.moveTo(-3,-2); ctx.lineTo(3,-2); ctx.lineTo(0,-24); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0.5,-2); ctx.lineTo(0,-24); ctx.stroke();
  ctx.fillStyle='rgba(0,229,255,0.2)';
  ctx.beginPath(); ctx.moveTo(-3,-2); ctx.lineTo(3,-2); ctx.lineTo(0,-24); ctx.closePath(); ctx.fill();

  ctx.lineCap='butt';
  ctx.restore();

  ctx.fillStyle='#607D8B'; ctx.beginPath(); ctx.roundRect(ox-15,oy-36,30,26,[10,10,0,0]); ctx.fill();
  ctx.fillStyle='#78909C'; ctx.beginPath(); ctx.roundRect(ox-15,oy-36,30,7,[10,10,0,0]); ctx.fill();
  ctx.fillStyle='#546E7A'; ctx.fillRect(ox-15,oy-30,30,3);
  ctx.fillStyle='#00E5FF'; ctx.fillRect(ox-10,oy-28,8,6); ctx.fillRect(ox+2,oy-28,8,6);
  ctx.fillStyle='rgba(0,229,255,.4)'; ctx.fillRect(ox-10,oy-28,8,6); ctx.fillRect(ox+2,oy-28,8,6);
  ctx.fillStyle='#212121'; ctx.fillRect(ox-8,oy-27,4,4); ctx.fillRect(ox+4,oy-27,4,4);
  ctx.fillStyle='#00E5FF'; ctx.fillRect(ox-7,oy-26,2,2); ctx.fillRect(ox+5,oy-26,2,2);
  /* antenna */
  ctx.fillStyle='#90A4AE'; ctx.fillRect(ox-2,oy-40,4,6);
  ctx.fillStyle='#F44336'; ctx.beginPath(); ctx.arc(ox,oy-41,3.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#212121'; ctx.fillRect(ox-8,oy-16,16,5);
  ctx.fillStyle='#546E7A'; ctx.fillRect(ox-8,oy-14,3,3); ctx.fillRect(ox+1,oy-14,3,3); ctx.fillRect(ox+5,oy-14,3,3);
}

/* в”Җв”Җ Monstro (8 HP, robusto, roxo-esverdeado) в”Җв”Җ */
function drawMonster(e,ox,oy){
  const mv=e.state==='patrol'||e.state==='chase';
  const bob=mv?Math.sin(e.animFrame*Math.PI/2)*2:0;
  const t=e.animFrame;
  /* sombra */
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(ox,oy+36+bob,22,6,0,0,Math.PI*2); ctx.fill();
  /* pernas */
  ctx.fillStyle='#4a1060';
  ctx.fillRect(ox-14,oy+18+bob,12,20); ctx.fillRect(ox+2,oy+18+bob,12,20);
  /* garras nos pГ©s */
  ctx.fillStyle='#1a0030';
  ctx.fillRect(ox-16,oy+36+bob,6,6); ctx.fillRect(ox-12,oy+38+bob,5,5);
  ctx.fillRect(ox+3,oy+36+bob,6,6); ctx.fillRect(ox+9,oy+38+bob,5,5);

  /* espinhos nas costas */

  }
  /* braГ§os grossos com swing de ataque */
  const mSwing = eAtkSwing(e) * e.facing;
  const mSw = Math.sin(t*Math.PI/2)*3;
  ctx.save(); ctx.translate(ox+26,oy-6+bob); ctx.rotate(-mSwing + mSw*0.05);
  ctx.fillStyle='#7a1a8a'; ctx.beginPath(); ctx.roundRect(-8,0,16,24,6); ctx.fill();
  /* garras direita */
  ctx.fillStyle='#1a0030'; ctx.fillRect(-2,22,5,7); ctx.fillRect(4,24,5,6); ctx.restore();
  ctx.save(); ctx.translate(ox-26,oy-6+bob); ctx.rotate(mSwing - mSw*0.05);
  ctx.fillStyle='#7a1a8a'; ctx.beginPath(); ctx.roundRect(-8,0,16,24,6); ctx.fill();
  /* garras esquerda */
  ctx.fillStyle='#1a0030'; ctx.fillRect(-7,22,5,7); ctx.fillRect(-9,24,5,6); ctx.restore();
  /* cabeГ§a */
  const hg=ctx.createLinearGradient(ox-18,oy-46+bob,ox+18,oy-16+bob);
  hg.addColorStop(0,'#8a1a9a'); hg.addColorStop(1,'#5a0870');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.roundRect(ox-18,oy-46+bob,36,32,10); ctx.fill();
  /* chifres */
  ctx.fillStyle='#cc3300';
  ctx.beginPath(); ctx.moveTo(ox-14,oy-44+bob); ctx.lineTo(ox-20,oy-60+bob); ctx.lineTo(ox-8,oy-44+bob); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(ox+6,oy-44+bob); ctx.lineTo(ox+20,oy-60+bob); ctx.lineTo(ox+14,oy-44+bob); ctx.closePath(); ctx.fill();
  /* olhos brilhantes */
  ctx.fillStyle='#ff0'; ctx.beginPath(); ctx.ellipse(ox-8,oy-34+bob,7,6,0,0,Math.PI*2); ctx.fill();

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DRAW PARTICLES / FLOAT TEXTS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life/p.maxLife; ctx.fillStyle=p.color;
    ctx.fillRect(p.x-cam.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;
}

function drawArrows(){
  ctx.save();
  ctx.lineCap='round';
  for (const a of arrows) {
    const angle = Math.atan2(a.vy, a.vx);
    ctx.save();
    ctx.translate(a.x - cam.x, a.y);
    ctx.rotate(angle);
    /* haste */
    ctx.strokeStyle='#8D6E63'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(8,0); ctx.stroke();
    /* ponta metГЎlica */
    ctx.fillStyle='#90A4AE';
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(15,3); ctx.lineTo(15,-3); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#B0BEC5'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(15,0); ctx.stroke();
    /* penas vermelhas */
    ctx.strokeStyle='#EF5350'; ctx.lineWidth=1.8;
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-9,-5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(-9, 5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-11,0); ctx.lineTo(-7,-4); ctx.stroke();
    ctx.restore();
  }
  ctx.lineCap='butt';
  ctx.restore();
}

function drawPowerRings(){
  for(const r of powerRings){
    const alpha=(r.life/r.maxLife)*.7;
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#FFD700';
    ctx.lineWidth=4*(r.life/r.maxLife);
    ctx.beginPath(); ctx.arc(r.x-cam.x, r.y, r.r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(255,120,0,.5)';
    ctx.lineWidth=8*(r.life/r.maxLife);
    ctx.beginPath(); ctx.arc(r.x-cam.x, r.y, r.r+4, 0, Math.PI*2); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.lineWidth=1;
}
function drawFloatTexts(){
  ctx.textAlign='center';
  for(const t of floatTexts){
    ctx.globalAlpha=t.life/t.maxLife;
    ctx.fillStyle=t.color; ctx.font='bold 17px Arial';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(t.text, t.x, t.y);
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1; ctx.textAlign='left';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   DRAW HUD
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawHUD(){
  // HP bar
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(14,14,216,32);
  const hw=212*(player.hp/player.maxHp);
  const hg=ctx.createLinearGradient(16,0,16+hw,0);
  hg.addColorStop(0,'#C62828'); hg.addColorStop(1,'#FF8A80');
  ctx.fillStyle=hg; ctx.fillRect(16,16,hw,28);
  ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fillRect(16,16,hw,9);
  ctx.strokeStyle='#F9A825'; ctx.lineWidth=2; ctx.strokeRect(14,14,216,32);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Arial'; ctx.textAlign='left';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText(`HP  ${Math.ceil(player.hp)} / ${player.maxHp}`,22,36);
  ctx.shadowBlur=0;

  /* в”Җв”Җ ГҚcone de cura de emergГӘncia в”Җв”Җ */
  const healReady = player.healCooldown <= 0;
  const hx = 14, hy = 50;
  ctx.fillStyle = healReady ? 'rgba(0,0,0,.55)' : 'rgba(0,0,0,.35)';
  ctx.fillRect(hx, hy, 130, 20);
  /* barra de cooldown */
  if (!healReady) {
    const cd = player.healCooldown / 600;
    ctx.fillStyle = 'rgba(102,187,106,0.35)';
    ctx.fillRect(hx+1, hy+1, Math.round(128*(1-cd)), 18);
  }
  ctx.strokeStyle = healReady ? '#66BB6A' : 'rgba(102,187,106,0.40)';
  ctx.lineWidth = 1.5; ctx.strokeRect(hx, hy, 130, 20); ctx.lineWidth = 1;
  ctx.fillStyle = healReady ? '#A5D6A7' : 'rgba(165,214,167,0.5)';
  ctx.font = `bold 11px Arial`; ctx.textAlign = 'left';
  ctx.shadowColor='#000'; ctx.shadowBlur=3;
  ctx.fillText(healReady ? 'вңҡ CURA PRONTA' : 'вңҡ CURA RECARG...', hx+6, hy+14);
  ctx.shadowBlur=0;

  // Score + moedas (painel unificado compacto)
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(canvas.width-188,14,174,46);
  ctx.fillStyle='#F9A825'; ctx.font='bold 17px Arial'; ctx.textAlign='right';
  ctx.shadowColor='#000'; ctx.shadowBlur=4;
  ctx.fillText(`SCORE  ${score}`,canvas.width-17,32); ctx.shadowBlur=0;
  /* moeda desenhada */
  const cix=canvas.width-175, ciy=46;
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(cix,ciy,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFA000'; ctx.beginPath(); ctx.arc(cix,ciy,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,180,0.9)'; ctx.beginPath(); ctx.arc(cix-1.5,ciy-1.5,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.shadowColor='#000'; ctx.shadowBlur=3;
  ctx.fillText(coins.toLocaleString(), cix+10, ciy+4); ctx.shadowBlur=0;
  ctx.strokeStyle='#F9A825'; ctx.lineWidth=2; ctx.strokeRect(canvas.width-188,14,174,46); ctx.lineWidth=1;

  /* в”Җв”Җ Popups de moedas flutuantes в”Җв”Җ */
  for(let i=coinPopups.length-1;i>=0;i--){
    const p=coinPopups[i];
    p.y -= 0.8; p.timer--;
    if(p.timer<=0){ coinPopups.splice(i,1); continue; }
    const alpha=Math.min(1,p.timer/20);
    ctx.save();
    ctx.globalAlpha=alpha;
    const px2=p.x-cam.x, py2=p.y-cam.y+10;
    /* Гӯcone moeda mini */
    ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(px2-18,py2-4,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFA000'; ctx.beginPath(); ctx.arc(px2-18,py2-4,3.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#FFD700'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText(`+${p.val}`, px2, py2);
    ctx.shadowBlur=0; ctx.restore();
  }

  // Phase
  const ph=PHASES[currentPhase];
  ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(canvas.width/2-125,14,250,28);
  ctx.fillStyle='#fff'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText(ph.name, canvas.width/2, 33);

  // Power bar
  const barY=52;
  ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(14,barY,216,22);
  for(let i=0;i<player.maxPower;i++){
    const full=i<player.power;
    const bx=16+i*72, bw=68;
    if(full){
      const pg=ctx.createLinearGradient(bx,0,bx+bw,0);
      if(player.powerCooldown>0){pg.addColorStop(0,'#888');pg.addColorStop(1,'#aaa');}
      else{pg.addColorStop(0,'#F9A825');pg.addColorStop(1,'#FFD700');}
      ctx.fillStyle=pg; ctx.fillRect(bx,barY+2,bw,18);
      ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fillRect(bx,barY+2,bw,6);
    } else {
      ctx.fillStyle='rgba(80,60,0,.5)'; ctx.fillRect(bx,barY+2,bw,18);
    }
    ctx.strokeStyle='rgba(200,150,0,.6)'; ctx.lineWidth=1; ctx.strokeRect(bx,barY+2,bw,18);
  }
  // lightning bolt icon + label
  ctx.fillStyle=player.power===player.maxPower&&player.powerCooldown===0?'#FFD700':'#888';
  ctx.font='bold 12px Arial'; ctx.textAlign='left';
  const pLabel=player.powerCooldown>0?'RECARREGANDO...'
               :player.power===player.maxPower?'вҡЎ PODER PRONTO (Clique Dir / Q)'
               :`вҡЎ Cargas: ${player.power} / ${player.maxPower}`;
  ctx.shadowColor='#000'; ctx.shadowBlur=3;
  ctx.fillText(pLabel, 20, barY+15); ctx.shadowBlur=0;
  ctx.strokeStyle='#F9A825'; ctx.lineWidth=2; ctx.strokeRect(14,barY,216,22); ctx.lineWidth=1;

  /* в”Җв”Җ Barra de HP do Boss в”Җв”Җ */
  const bossEnemy = enemies.find(en=>en.type==='boss'&&en.hp>0);
  if(bossEnemy){
    const bw=220, bh=14, bx=(canvas.width-bw)/2, by=canvas.height-48;
    /* fundo pulsante */
    const pulse2=Math.sin(gf*0.1)*0.12+0.88;
    ctx.fillStyle=`rgba(80,0,0,${0.85*pulse2})`;
    ctx.beginPath(); ctx.roundRect(bx-4,by-18,bw+8,bh+24,6); ctx.fill();
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(bx-4,by-18,bw+8,bh+24,6); ctx.stroke();
    ctx.lineWidth=1;
    /* tГӯtulo acima */
    ctx.fillStyle='#ff6600'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=8;
    ctx.fillText('вҳ   BOSS FINAL  вҳ ', canvas.width/2, by-6);
    ctx.shadowBlur=0;
    /* barra de HP */
    const ratio=bossEnemy.hp/ENEMY_DEFS.boss.maxHp;
    const bossBarW=bw*ratio;
    const hpGrad=ctx.createLinearGradient(bx,0,bx+bossBarW,0);
    hpGrad.addColorStop(0,'#880000'); hpGrad.addColorStop(0.5,'#dd2200'); hpGrad.addColorStop(1,'#ff4400');
    ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=hpGrad; ctx.fillRect(bx,by,bossBarW,bh);
    ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(bx,by,bossBarW,bh*0.4);
    /* segmentos */
    for(let i=1;i<ENEMY_DEFS.boss.maxHp;i++){
      const sx=bx+bw*(i/ENEMY_DEFS.boss.maxHp);
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(sx,by); ctx.lineTo(sx,by+bh); ctx.stroke();
    }
    /* HP no centro da barra */
    ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=3;
    ctx.fillText(`${bossEnemy.hp} / ${ENEMY_DEFS.boss.maxHp} HP`, bx+bw/2, by+bh/2+3);
    ctx.shadowBlur=0;
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=1.5; ctx.strokeRect(bx,by,bw,bh); ctx.lineWidth=1;
  }

  // Controls bar
  ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillRect(14,canvas.height-27,590,22);
  ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='11px Arial'; ctx.textAlign='left';
  ctx.fillText('WASD/Setas: Mover  |  W/EspaГ§o: Pular  |  X/J/Clique Esq: Atacar  |  Clique Dir/Q: PODER (3 cargas)  |  R: Reiniciar',20,canvas.height-12);

  /* в”Җв”Җ BotГЈo SOM no HUD (canto inferior direito) в”Җв”Җ */
  drawHudSoundBtn();

}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   PAINEL DE MOEDAS NO MENU INICIAL
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
function drawMenuCoinPanel() {
  const px=14, py=12, pw=220, ph=32;
  const pulse = Math.sin(gf*0.08)*0.06+0.94;

  /* fundo */
  ctx.fillStyle='rgba(10,8,28,0.88)';
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,12); ctx.fill();
  ctx.strokeStyle=`rgba(255,215,0,${0.55*pulse})`;
  ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,12); ctx.stroke();
  ctx.lineWidth=1;

  /* Гӯcone moeda animado */
  const coinX=px+20, coinY=py+ph/2;
  ctx.fillStyle=`rgba(255,215,0,${pulse})`;
  ctx.beginPath(); ctx.arc(coinX,coinY,9,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(180,130,0,0.7)';
  ctx.beginPath(); ctx.arc(coinX,coinY,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFD700'; ctx.font='bold 9px Arial'; ctx.textAlign='center';
  ctx.fillText('$', coinX, coinY+3);

  /* valor */
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px Arial'; ctx.textAlign='left';
  ctx.shadowColor='rgba(255,200,0,0.6)'; ctx.shadowBlur=6;
  ctx.fillText(coins.toLocaleString(), px+35, py+ph/2+5);
  ctx.shadowBlur=0;

  /* label moedas */
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='9px Arial';
  ctx.fillText('moedas', px+35+ctx.measureText(coins.toLocaleString()).width+6, py+ph/2+5);

  /* indicador de progresso para prГіxima arma */
  const nextWeapon = !ownedWeapons.includes('axe')?'axe': !ownedWeapons.includes('sword')?'sword':null;
  if (nextWeapon) {
    const price=WEAPON_PRICE[nextWeapon];
    const ratio=Math.min(1, coins/price);
    const barX=px+8, barY=py+ph+4, barW=pw-16, barH=5;
    ctx.fillStyle='rgba(255,255,255,0.07)'; ctx.beginPath(); ctx.roundRect(barX,barY,barW,barH,3); ctx.fill();
    if(ratio>0){
      const g=ctx.createLinearGradient(barX,0,barX+barW,0);
      g.addColorStop(0,'#B8860B'); g.addColorStop(1,'#FFD700');
      ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(barX,barY,barW*ratio,barH,3); ctx.fill();
    }
    ctx.fillStyle='rgba(255,215,0,0.45)'; ctx.font='8px Arial'; ctx.textAlign='left';
    ctx.fillText(`Prox: ${WEAPON_NAME[nextWeapon]} вҖ” ${price.toLocaleString()} (${Math.floor(ratio*100)}%)`, barX+14, barY+barH+9);
    drawCoinIcon(barX+6, barY+barH+5, 4);
  }
  ctx.textAlign='left';
}

/* desenha Гӯcone de moeda no canvas sem emoji */
function drawCoinIcon(x, y, r=6){
  ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#FFA000'; ctx.beginPath(); ctx.arc(x,y,r*0.7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,180,0.85)'; ctx.beginPath(); ctx.arc(x-r*0.28,y-r*0.28,r*0.3,0,Math.PI*2); ctx.fill();
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SCREENS
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
/* в”Җв”Җ BotГөes do menu de pausa в”Җв”Җ */
const PAUSE_BTNS = [
  { id:'resume',  label:'в–¶  CONTINUAR'   },
  { id:'mute',    label:''                },
  { id:'menu',    label:'вҢӮ  MENU INICIAL' },
  { id:'quit',    label:'вң•  SAIR DO JOGO' },
];
const PAUSE_BW = 260, PAUSE_BH = 44, PAUSE_GAP = 12;

function getPauseBtnRects() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const startY = cy - 10;   // comeГ§a acima do centro
  return PAUSE_BTNS.map((b, i) => ({
    ...b,
    x: cx - PAUSE_BW / 2,
    y: startY + i * (PAUSE_BH + PAUSE_GAP),
    w: PAUSE_BW,
    h: PAUSE_BH,
  }));
}

function drawPauseScreen() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;

  /* в”Җв”Җ Overlay escuro в”Җв”Җ */
  ctx.fillStyle = 'rgba(5,8,22,0.80)';
  ctx.fillRect(0, 0, W, H);

  /* в”Җв”Җ Calcular posiГ§ГЈo dos botГөes para encaixar o painel em volta в”Җв”Җ */
  const rects = getPauseBtnRects();
  const topBtn    = rects[0].y;
  const botBtn    = rects[rects.length-1].y + PAUSE_BH;
  const padTop    = 110;   // espaГ§o acima dos botГөes (para tГӯtulo)
  const padBot    = 36;    // espaГ§o abaixo dos botГөes
  const pw = 320;
  const ph = padTop + (botBtn - topBtn) + padBot;
  const px = cx - pw / 2;
  const py = topBtn - padTop;

  /* в”Җв”Җ Painel в”Җв”Җ */
  ctx.fillStyle = 'rgba(12,18,48,0.96)';
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 20); ctx.fill();
  ctx.strokeStyle = '#F9A825'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 20); ctx.stroke();
  ctx.lineWidth = 1;

  /* в”Җв”Җ TГӯtulo в”Җв”Җ */
  ctx.textAlign = 'center';
  ctx.shadowColor = '#F9A825'; ctx.shadowBlur = 28;
  ctx.fillStyle = '#F9A825';
  ctx.font = 'bold 38px Arial';
  ctx.fillText('вҸё  PAUSADO', cx, py + 52);
  ctx.shadowBlur = 0;

  /* Linha divisГіria */
  ctx.strokeStyle = 'rgba(249,168,37,0.30)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(px+28, py+66); ctx.lineTo(px+pw-28, py+66); ctx.stroke();
  ctx.lineWidth = 1;

  /* Fase atual */
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '13px Arial';
  const phaseNames = ['Floresta','Caverna','Castelo em Chamas','Tundra Gelada','EspaГ§o Sideral'];
  ctx.fillText(`Fase ${currentPhase+1} вҖ” ${phaseNames[currentPhase]||''}`, cx, py + 88);

  /* в”Җв”Җ BotГөes в”Җв”Җ */
  rects[1].label = (volMusic <= 0 ? 'рҹ”Ү  ATIVAR SOM' : 'рҹ”Ҡ  MUTAR SOM');

  rects.forEach((b, i) => {
    const hover = pauseHover === i;
    if (hover) { ctx.shadowColor='#F9A825'; ctx.shadowBlur=12; }

    const isQuit  = b.id==='quit';
    const isMenu  = b.id==='menu';
    const isMute  = b.id==='mute';
    const bgColor = isQuit  ? `rgba(239,83,80,${hover?'0.25':'0.08'})`
                  : isMenu  ? `rgba(66,165,245,${hover?'0.25':'0.08'})`
                  : isMute  ? `rgba(120,144,156,${hover?'0.22':'0.06'})`
                  :           `rgba(249,168,37,${hover?'0.22':'0.06'})`;
    const border  = isQuit  ? (hover?'#EF5350':'rgba(239,83,80,0.45)')
                  : isMenu  ? (hover?'#42A5F5':'rgba(66,165,245,0.45)')
                  : isMute  ? (hover?'#90A4AE':'rgba(120,144,156,0.40)')
                  :           (hover?'#F9A825':'rgba(249,168,37,0.38)');
    const txtCol  = isQuit  ? (hover?'#FF5252':'#EF9A9A')
                  : isMenu  ? (hover?'#90CAF9':'#64B5F6')
                  : isMute  ? (hover?'#CFD8DC':'#90A4AE')
                  :           (hover?'#FFF'   :'#F9A825');

    ctx.fillStyle = bgColor;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 11); ctx.fill();
    ctx.strokeStyle = border;
    ctx.lineWidth = hover ? 2 : 1.5;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 11); ctx.stroke();
    ctx.shadowBlur=0; ctx.lineWidth=1;

    ctx.fillStyle = txtCol;
    ctx.font = `bold ${hover?16:15}px Arial`;
    ctx.fillText(b.label, cx, b.y + b.h/2 + 5.5);
  });

  /* Dica */
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px Arial';
  ctx.fillText('ESC ou P para continuar', cx, py + ph - 12);
  ctx.textAlign = 'left';
}

/* hover state para botГөes de pausa */
let pauseHover = -1;

canvas.addEventListener('wheel', e=>{
  if (gameState==='achievements') { achScrollY += e.deltaY*0.5; e.preventDefault(); }
}, { passive:false });

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);
  mouseX = mx; mouseY = my;

  if (gameState === 'menu') {
    const pb=getMenuPlayBtn(), cb=getMenuCharBtn(), wb2=getWeaponMenuBtn();
    const ab3=getAchBtn(), clb2=getColorMenuBtn();
    if(showWeaponMenu || showColorMenu){
      menuHover=-1;
      if(showWeaponMenu){
        const sm=getWeaponSubmenuBtns();
        for(let i=0;i<sm.weapons.length;i++){
          const b=sm.weapons[i];
          if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){ menuHover=20+i; break; }
        }
      }
    } else {
      if(mx>=pb.x&&mx<=pb.x+pb.w&&my>=pb.y&&my<=pb.y+pb.h) menuHover=0;
      else if(mx>=cb.x&&mx<=cb.x+cb.w&&my>=cb.y&&my<=cb.y+cb.h) menuHover=1;
      else if(mx>=wb2.x&&mx<=wb2.x+wb2.w&&my>=wb2.y&&my<=wb2.y+wb2.h) menuHover=2;
      else if(mx>=ab3.x&&mx<=ab3.x+ab3.w&&my>=ab3.y&&my<=ab3.y+ab3.h) menuHover=3;
      else if(mx>=clb2.x&&mx<=clb2.x+clb2.w&&my>=clb2.y&&my<=clb2.y+clb2.h) menuHover=4;
      else menuHover=-1;
    }
  } else { menuHover=-1; }

  if (gameState === 'paused') {
    pauseHover = -1;
    getPauseBtnRects().forEach((b, i) => {
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) pauseHover = i;
    });
  } else { pauseHover = -1; }

  if (gameState === 'gameover') {
    goHover = -1;
    getGoBtnRects().forEach((b, i) => {
      if (mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h) goHover = i;
    });
  } else { goHover = -1; }
});

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ

function getMenuPlayBtn()   { return { x:canvas.width-290, y:canvas.height-80, w:260, h:58 }; }
function getMenuCharBtn()   { return { x:20, y:canvas.height-80,  w:220, h:48 }; }
function getWeaponMenuBtn() { return { x:20, y:canvas.height-200, w:220, h:48 }; }
function getAchBtn()        { return { x:20, y:canvas.height-260, w:220, h:48 }; }

function getWeaponSubmenuBtns() {
  const W=canvas.width, H=canvas.height;
  const pw=280, ph=360, px=(W-pw)/2, py=(H-ph)/2;
  const bw=220, bh=72, bx=px+30;
  return {
    panel:{x:px,y:py,w:pw,h:ph},
    close:{x:px+pw-36,y:py+8,w:28,h:28},
    weapons:[
      {id:'scythe',x:bx,y:py+60, w:bw,h:bh},
      {id:'axe',   x:bx,y:py+148,w:bw,h:bh},
      {id:'sword', x:bx,y:py+236,w:bw,h:bh},
    ]
  };
}

function drawWeaponSubmenu() {
  const W=canvas.width, H=canvas.height;
  const sm=getWeaponSubmenuBtns();
  const p=sm.panel;

  /* overlay */
  ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,W,H);

  /* painel */
  ctx.fillStyle='rgba(10,8,28,0.97)';
  ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,18); ctx.fill();
  ctx.strokeStyle='rgba(200,160,40,0.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,18); ctx.stroke(); ctx.lineWidth=1;

  /* tГӯtulo + moedas disponГӯveis */
  ctx.textAlign='center'; ctx.fillStyle='#FFD54F'; ctx.font='bold 15px Arial';
  ctx.fillText('вҡ”  ARMAS', p.x+p.w/2, p.y+30);
  ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial'; ctx.textAlign='left';
  drawCoinIcon(p.x+p.w/2-52, p.y+50, 5);
  ctx.fillText(`${coins} moedas`, p.x+p.w/2-44, p.y+54);

  /* botГЈo fechar */
  const cl=sm.close;
  ctx.fillStyle='rgba(255,80,80,0.2)'; ctx.beginPath(); ctx.roundRect(cl.x,cl.y,cl.w,cl.h,6); ctx.fill();
  ctx.strokeStyle='rgba(255,80,80,0.6)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(cl.x,cl.y,cl.w,cl.h,6); ctx.stroke(); ctx.lineWidth=1;
  ctx.fillStyle='rgba(255,120,120,0.9)'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('вң•', cl.x+cl.w/2, cl.y+cl.h/2+5);

  const descs={scythe:'Veloz e ГЎgil',axe:'Forte e pesado',sword:'Equilibrado'};
  const cols ={scythe:'80,200,120',  axe:'220,140,40',   sword:'80,160,230'};

  for(const b of sm.weapons){
    const owned  = ownedWeapons.includes(b.id);
    const sel    = selectedWeapon===b.id;
    const price  = WEAPON_PRICE[b.id];
    const col    = cols[b.id];
    const canBuy = !owned && coins>=price;
    const hov    = typeof mouseX!=='undefined' && mouseX>=b.x&&mouseX<=b.x+b.w&&mouseY>=b.y&&mouseY<=b.y+b.h;

    /* fundo */
    ctx.fillStyle = owned
      ? (sel?`rgba(${col},0.22)`:'rgba(255,255,255,0.06)')
      : (canBuy?'rgba(255,215,0,0.06)':'rgba(30,30,50,0.7)');
    if(hov && owned && !sel) ctx.fillStyle=`rgba(${col},0.14)`;
    if(hov && canBuy) ctx.fillStyle='rgba(255,215,0,0.14)';
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,12); ctx.fill();

    /* borda */
    ctx.strokeStyle = sel?`rgb(${col})`:owned?`rgba(${col},0.5)`:canBuy?'rgba(255,215,0,0.7)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=sel?2.5:1.5;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,12); ctx.stroke(); ctx.lineWidth=1;

    drawWeaponIcon(b.x+36, b.y+b.h/2, b.id, 22);
    ctx.textAlign='left';

    if(owned){
      ctx.fillStyle=sel?`rgb(${col})`:'rgba(255,255,255,0.85)'; ctx.font=`bold 12px Arial`;
      ctx.fillText(WEAPON_NAME[b.id], b.x+62, b.y+b.h/2-10);
      ctx.fillStyle=`rgba(${col},0.8)`; ctx.font='11px Arial';
      ctx.fillText(`DMG ${WEAPON_DMG[b.id]}  В·  ${descs[b.id]}`, b.x+62, b.y+b.h/2+6);
      if(sel){ ctx.fillStyle=`rgba(${col},0.9)`; ctx.font='bold 10px Arial'; ctx.fillText('вң” Equipada',b.x+62,b.y+b.h/2+20); }
    } else {
      /* nГЈo comprada */
      ctx.fillStyle=canBuy?'#FFD700':'rgba(255,255,255,0.4)'; ctx.font='bold 12px Arial';
      ctx.fillText(WEAPON_NAME[b.id], b.x+62, b.y+b.h/2-10);
      ctx.fillStyle=canBuy?'rgba(255,215,0,0.9)':'rgba(255,80,80,0.7)'; ctx.font='bold 12px Arial';
      drawCoinIcon(b.x+62, b.y+b.h/2+4, 5);
      ctx.fillText(`${price}`, b.x+74, b.y+b.h/2+8);
      ctx.fillStyle=canBuy?'rgba(255,255,255,0.6)':'rgba(255,100,100,0.5)'; ctx.font='10px Arial';
      ctx.fillText(canBuy?'Clique para comprar':'Moedas insuficientes', b.x+62, b.y+b.h/2+22);
    }
  }
  ctx.textAlign='left';
}

/* Desenha o personagem grande no menu (pose idle animada) */
function drawMenuCharacter(cx, cy, scale, char) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(scale, scale);

  const bob = Math.sin(gf * 0.04) * 3;
  const breathe = Math.sin(gf * 0.03) * 1.5;
  const C = PLAYER_COLORS;

  /* personagem masculino usa sprite idle */
  if (char !== 'female') {
    const s = SMALE.idle;
    if (s.img.complete && s.img.naturalWidth > 0) {
      const fi  = Math.floor(gf / 2.5) % s.frames;
      const col = fi % s.cols;
      const row = Math.floor(fi / s.cols);
      const dw = 100, dh = 100;
      ctx.drawImage(s.img,
        col * s.fw, row * s.fh, s.fw, s.fh,
        -dw/2, -dh * 0.38,
        dw, dh);
      ctx.restore();
      return;
    }
  }

  if (char === 'female') {
    /* Sombra */
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(0,56,28,8,0,0,Math.PI*2); ctx.fill();
    /* Pernas (antes da saia) */
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-12,30+bob,11,26,4); ctx.fill(); ctx.beginPath(); ctx.roundRect(2,30+bob,11,26,4); ctx.fill();
    ctx.fillStyle='#EC407A'; ctx.beginPath(); ctx.roundRect(-14,54+bob,15,9,[0,0,5,5]); ctx.fill(); ctx.beginPath(); ctx.roundRect(2,54+bob,15,9,[0,0,5,5]); ctx.fill();
    /* Saia (por cima das pernas) */
    ctx.fillStyle=C.fskirt;
    ctx.beginPath(); ctx.moveTo(-18,12+bob); ctx.lineTo(18,12+bob);
    ctx.lineTo(24,46+bob); ctx.lineTo(-24,46+bob); ctx.closePath(); ctx.fill();
    ctx.fillStyle=C.fskirt+'bb'; ctx.fillRect(-18,12+bob,36,8);
    /* Corpo */
    ctx.fillStyle=C.fshirt; ctx.beginPath(); ctx.roundRect(-17,-12+bob,34,26+breathe,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.22)'; ctx.beginPath(); ctx.roundRect(-17,-12+bob,34,10,[6,6,0,0]); ctx.fill();
    ctx.fillStyle=C.fshirt+'aa'; ctx.fillRect(-17,11+bob,34,3);
    /* LaГ§o */
    ctx.fillStyle=C.fskin;
    ctx.beginPath(); ctx.moveTo(-9,-8+bob); ctx.bezierCurveTo(-18,-16+bob,-18,-4+bob,-9,-6+bob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(9,-8+bob); ctx.bezierCurveTo(18,-16+bob,18,-4+bob,9,-6+bob); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-7+bob,5,0,Math.PI*2); ctx.fill();
    /* BraГ§os */
    ctx.fillStyle=C.fskin;
    ctx.beginPath(); ctx.roundRect(16,-10+bob+Math.sin(gf*.04)*4,11,18,5); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-27,-10+bob-Math.sin(gf*.04)*4,11,18,5); ctx.fill();
    /* CabeГ§a */
    ctx.fillStyle=C.fskin; ctx.beginPath(); ctx.roundRect(-15,-38+bob,30,28,11); ctx.fill();
    /* Cabelo */
    ctx.fillStyle=C.fhair; ctx.fillRect(-17,-44+bob,34,10);
    ctx.fillRect(-19,-34+bob,7,18); ctx.fillRect(12,-34+bob,7,18);
    ctx.beginPath(); ctx.arc(-12,-35+bob,9,Math.PI,0); ctx.fill();
    ctx.beginPath(); ctx.arc(12,-35+bob,9,Math.PI,0); ctx.fill();
    /* Rabo de cavalo */
    ctx.fillStyle=C.fhair+'cc';
    ctx.beginPath(); ctx.moveTo(18,-30+bob); ctx.bezierCurveTo(30,-22+bob,32,-8+bob,24,0+bob);
    ctx.lineTo(18,-4+bob); ctx.bezierCurveTo(24,-14+bob,22,-24+bob,16,-30+bob); ctx.closePath(); ctx.fill();
    /* Olhos */
    ctx.fillStyle='#fff'; ctx.fillRect(-11,-32+bob,7,7); ctx.fillRect(4,-32+bob,7,7);
    ctx.fillStyle='#6A1B9A'; ctx.fillRect(-10,-31+bob,4,4); ctx.fillRect(5,-31+bob,4,4);
    ctx.fillStyle='#fff'; ctx.fillRect(-9,-31+bob,2,2); ctx.fillRect(6,-31+bob,2,2);
    ctx.strokeStyle=C.fhair; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-11,-26+bob); ctx.lineTo(-15,-22+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(11,-26+bob); ctx.lineTo(15,-22+bob); ctx.stroke(); ctx.lineWidth=1;
    /* Boca */
    ctx.fillStyle=C.fshirt;
    ctx.beginPath(); ctx.arc(0,-20+bob,4,0,Math.PI); ctx.fill();

  } else {
    /* Sombra */
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(0,56,28,8,0,0,Math.PI*2); ctx.fill();
    /* Pernas */
    ctx.fillStyle=C.pants; ctx.beginPath(); ctx.roundRect(-13,12+bob,11,22,4); ctx.fill(); ctx.beginPath(); ctx.roundRect(2,12+bob,11,22,4); ctx.fill();
    ctx.fillStyle='#6D4C41'; ctx.beginPath(); ctx.roundRect(-15,32+bob,15,10,[0,0,5,5]); ctx.fill(); ctx.beginPath(); ctx.roundRect(1,32+bob,15,10,[0,0,5,5]); ctx.fill();
    /* Corpo */
    ctx.fillStyle=C.shirt; ctx.beginPath(); ctx.roundRect(-17,-12+bob,34,26+breathe,6); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.2)'; ctx.beginPath(); ctx.roundRect(-17,-12+bob,34,9,[6,6,0,0]); ctx.fill();
    ctx.fillStyle=C.shirt+'cc'; ctx.fillRect(-17,11+bob,34,3);
    ctx.fillStyle='#F9A825'; ctx.beginPath(); ctx.roundRect(-3,-6+bob,7,7,3); ctx.fill();
    /* BraГ§os */
    ctx.fillStyle=C.skin;
    ctx.beginPath(); ctx.roundRect(16,-10+bob+Math.sin(gf*.04)*4,11,20,5); ctx.fill();
    ctx.beginPath(); ctx.roundRect(-27,-10+bob-Math.sin(gf*.04)*4,11,20,5); ctx.fill();
    /* CabeГ§a */
    ctx.fillStyle=C.skin; ctx.beginPath(); ctx.roundRect(-14,-38+bob,28,26,10); ctx.fill();
    ctx.fillStyle=C.hair; ctx.beginPath(); ctx.roundRect(-14,-38+bob,28,11,[10,10,0,0]); ctx.fill(); ctx.fillRect(-16,-30+bob,5,8);
    /* Capacete */
    ctx.fillStyle=C.shirt; ctx.fillRect(-16,-41+bob,32,7); ctx.fillRect(-12,-52+bob,24,15);
    ctx.fillStyle='#fff'; ctx.fillRect(-2,-52+bob,12,5);
    /* Olhos */
    ctx.fillStyle='#fff'; ctx.fillRect(-10,-30+bob,6,7); ctx.fillRect(3,-30+bob,6,7);
    ctx.fillStyle='#263238'; ctx.fillRect(-9,-29+bob,4,5); ctx.fillRect(4,-29+bob,4,5);
    ctx.fillStyle='#fff'; ctx.fillRect(-8,-29+bob,2,2); ctx.fillRect(5,-29+bob,2,2);
    /* Boca */
    ctx.fillStyle='#C62828'; ctx.fillRect(-5,-18+bob,11,3);
  }

  /* в”Җв”Җ Arma equipada na mГЈo direita (acompanha o braГ§o) в”Җв”Җ */
  const armSwing = Math.sin(gf * 0.04) * 4;
  const armLen   = char === 'female' ? 18 : 20;
  const handX    = 16 + 5;
  const handY    = -10 + bob + armSwing + armLen;

  ctx.save();
  ctx.translate(handX, handY);
  ctx.rotate(Math.PI / 4 + armSwing * 0.08);
  ctx.lineCap='round'; ctx.lineJoin='round';

  if (selectedWeapon === 'scythe') {
    const cg=ctx.createLinearGradient(0,4,0,-20); cg.addColorStop(0,'#5D4037'); cg.addColorStop(0.5,'#8D6E63'); cg.addColorStop(1,'#4E342E');
    ctx.strokeStyle=cg; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-20); ctx.stroke();
    ctx.strokeStyle='#FFD54F'; ctx.lineWidth=1.5;
    for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(-2,-3-i*5); ctx.lineTo(2,-5-i*5); ctx.stroke(); }
    const lg=ctx.createLinearGradient(0,-20,22,-4); lg.addColorStop(0,'#B0BEC5'); lg.addColorStop(0.4,'#ECEFF1'); lg.addColorStop(1,'#607D8B');
    ctx.strokeStyle=lg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(0,-20); ctx.bezierCurveTo(22,-34,26,-8,10,-4); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,-20); ctx.bezierCurveTo(18,-31,22,-11,10,-5); ctx.stroke();
    ctx.fillStyle='rgba(100,180,255,0.3)';
    ctx.beginPath(); ctx.moveTo(0,-20); ctx.bezierCurveTo(14,-28,18,-12,8,-6); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ECEFF1'; ctx.beginPath(); ctx.arc(10,-4,2.5,0,Math.PI*2); ctx.fill();

  } else if (selectedWeapon === 'axe') {
    const cg=ctx.createLinearGradient(0,4,0,-22); cg.addColorStop(0,'#4E342E'); cg.addColorStop(0.6,'#795548'); cg.addColorStop(1,'#5D4037');
    ctx.strokeStyle=cg; ctx.lineWidth=4.5;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-22); ctx.stroke();
    ctx.fillStyle='#FFD54F';
    [-4,-12,-20].forEach(y=>{ ctx.beginPath(); ctx.arc(0,y,2,0,Math.PI*2); ctx.fill(); });
    const ag=ctx.createLinearGradient(-4,-32,16,-8); ag.addColorStop(0,'#78909C'); ag.addColorStop(0.5,'#CFD8DC'); ag.addColorStop(1,'#546E7A');
    ctx.fillStyle=ag;
    ctx.beginPath(); ctx.moveTo(-3,-16); ctx.lineTo(-4,-28); ctx.bezierCurveTo(2,-34,18,-30,17,-18); ctx.bezierCurveTo(17,-10,3,-8,-3,-16); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-4,-28); ctx.bezierCurveTo(2,-34,18,-30,17,-18); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath(); ctx.moveTo(-1,-18); ctx.lineTo(-2,-26); ctx.bezierCurveTo(2,-30,12,-27,12,-20); ctx.bezierCurveTo(12,-14,2,-12,-1,-18); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(80,100,120,0.6)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(5,-26); ctx.lineTo(6,-12); ctx.stroke();

  } else {
    const hg=ctx.createLinearGradient(0,4,0,-4); hg.addColorStop(0,'#4E342E'); hg.addColorStop(1,'#8D6E63');
    ctx.strokeStyle=hg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(0,-4); ctx.stroke();
    ctx.fillStyle='#E53935'; ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,150,150,0.7)'; ctx.beginPath(); ctx.arc(-1,-1,1.2,0,Math.PI*2); ctx.fill();
    const gg=ctx.createLinearGradient(-10,-4,10,-4); gg.addColorStop(0,'#F57F17'); gg.addColorStop(0.5,'#FFD54F'); gg.addColorStop(1,'#F57F17');
    ctx.strokeStyle=gg; ctx.lineWidth=5;
    ctx.beginPath(); ctx.moveTo(-10,-4); ctx.lineTo(10,-4); ctx.stroke();
    ctx.fillStyle='#FFD54F'; ctx.beginPath(); ctx.arc(-10,-4,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(10,-4,3,0,Math.PI*2); ctx.fill();
    const sg=ctx.createLinearGradient(-3,-4,3,-28); sg.addColorStop(0,'#90A4AE'); sg.addColorStop(0.5,'#ECEFF1'); sg.addColorStop(1,'#B0BEC5');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.moveTo(-3.5,-4); ctx.lineTo(3.5,-4); ctx.lineTo(0,-28); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(0.5,-4); ctx.lineTo(0,-28); ctx.stroke();
    ctx.strokeStyle='rgba(180,220,255,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-2,-6); ctx.lineTo(-1,-26); ctx.stroke();
  }
  ctx.lineCap='butt';
  ctx.restore();

  ctx.restore();
}
