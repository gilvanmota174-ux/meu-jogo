const STORE_PKGS = [
  { coins:1000,  price:'R$ 1,99',  label:'Saquinho',   color:'#66BB6A', icon:'рҹ’°' },
  { coins:5000,  price:'R$ 4,99',  label:'Bolsa',      color:'#42A5F5', icon:'рҹ’Һ' },
  { coins:15000, price:'R$ 9,99',  label:'BaГә',        color:'#FFA726', icon:'рҹҸҶ' },
  { coins:40000, price:'R$ 19,99', label:'Tesouro',    color:'#EF5350', icon:'рҹ‘‘' },
  { coins:100000,price:'R$ 39,99', label:'Lenda',      color:'#AB47BC', icon:'вҡЎ' },
];

function getStorePanel(){
  const W=canvas.width, H=canvas.height;
  const pw=420, ph=380, px=(W-pw)/2, py=(H-ph)/2;
  const bw=360, bh=52, bx=px+30;
  return {
    panel: {x:px,y:py,w:pw,h:ph},
    close: {x:px+pw-36,y:py+8,w:28,h:28},
    packages: STORE_PKGS.map((p,i)=>({ ...p, x:bx, y:py+68+i*(bh+8), w:bw, h:bh }))
  };
}

function drawStoreSubmenu(){
  const sp=getStorePanel(), {panel:p,close:cl,packages:pkgs}=sp;
  /* overlay */
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  /* painel */
  const g=ctx.createLinearGradient(p.x,p.y,p.x,p.y+p.h);
  g.addColorStop(0,'#0d1b2a'); g.addColorStop(1,'#1a0d2e');
  ctx.fillStyle=g; ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,18); ctx.fill();
  ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(p.x,p.y,p.w,p.h,18); ctx.stroke(); ctx.lineWidth=1;
  /* tГӯtulo */
  ctx.textAlign='center'; ctx.fillStyle='#FFD700'; ctx.font='bold 18px Arial';
  ctx.shadowColor='rgba(255,200,0,0.5)'; ctx.shadowBlur=10;
  ctx.fillText('рҹӣ’  LOJA DE MOEDAS', p.x+p.w/2, p.y+34);
  ctx.shadowBlur=0;
  /* subtГӯtulo */
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='11px Arial';
  ctx.fillText('DisponГӯvel em breve na Play Store', p.x+p.w/2, p.y+52);
  /* pacotes */
  for(const pkg of pkgs){
    const hov=mouseX>=pkg.x&&mouseX<=pkg.x+pkg.w&&mouseY>=pkg.y&&mouseY<=pkg.y+pkg.h;
    ctx.fillStyle=hov?`${pkg.color}33`:'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(pkg.x,pkg.y,pkg.w,pkg.h,10); ctx.fill();
    ctx.strokeStyle=hov?pkg.color:'rgba(255,255,255,0.15)'; ctx.lineWidth=hov?2:1;
    ctx.beginPath(); ctx.roundRect(pkg.x,pkg.y,pkg.w,pkg.h,10); ctx.stroke(); ctx.lineWidth=1;
    /* Гӯcone moeda */
    drawCoinIcon(pkg.x+20, pkg.y+pkg.h/2, 10);
    /* quantidade */
    ctx.fillStyle=pkg.color; ctx.font='bold 14px Arial'; ctx.textAlign='left';
    ctx.fillText(`+${pkg.coins.toLocaleString()}`, pkg.x+38, pkg.y+pkg.h/2-4);
    ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px Arial';
    ctx.fillText(pkg.label, pkg.x+38, pkg.y+pkg.h/2+12);
    /* preГ§o */
    ctx.fillStyle=hov?'#fff':'rgba(255,255,255,0.85)'; ctx.font='bold 15px Arial'; ctx.textAlign='right';
    ctx.shadowColor='#000'; ctx.shadowBlur=4;
    ctx.fillText(pkg.price, pkg.x+pkg.w-14, pkg.y+pkg.h/2+5);
    ctx.shadowBlur=0;
    /* seta */
    ctx.fillStyle=hov?pkg.color:'rgba(255,255,255,0.25)'; ctx.font='13px Arial';
    ctx.fillText('в–¶', pkg.x+pkg.w-36, pkg.y+pkg.h/2+5);
  }
  /* mensagem temporГЎria */
  if(storeMsgTimer>0){
    storeMsgTimer--;
    const alpha=Math.min(1,storeMsgTimer/30);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(20,20,40,0.92)'; ctx.beginPath();
    ctx.roundRect(p.x+20, p.y+p.h-46, p.w-40, 34, 10); ctx.fill();
    ctx.strokeStyle='#FFD700'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(p.x+20, p.y+p.h-46, p.w-40, 34, 10); ctx.stroke(); ctx.lineWidth=1;
    ctx.fillStyle='#FFD700'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
    ctx.fillText('Em breve na Play Store!', p.x+p.w/2, p.y+p.h-24);
    ctx.restore();
  }
  /* botГЈo fechar */
  const hc=mouseX>=cl.x&&mouseX<=cl.x+cl.w&&mouseY>=cl.y&&mouseY<=cl.y+cl.h;
  ctx.fillStyle=hc?'rgba(255,80,80,0.4)':'rgba(255,80,80,0.15)';
  ctx.beginPath(); ctx.roundRect(cl.x,cl.y,cl.w,cl.h,6); ctx.fill();
  ctx.fillStyle='#ff6060'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('вң•', cl.x+cl.w/2, cl.y+cl.h/2+5);
  ctx.textAlign='left';
}

function drawMenuScreen() {
  const W=canvas.width, H=canvas.height, cx=W/2;

  /* в”Җв”Җ Fundo gradiente atmosfГ©rico в”Җв”Җ */
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020510');
  bg.addColorStop(0.45,'#0a0e22');
  bg.addColorStop(1,'#1a0a08');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  /* Estrelas */
  for(let i=0;i<90;i++){
    const sx=((i*173)%W), sy=((i*97)%(H*.6));
    const tw=Math.sin(gf*.05+i)*.5+.5;
    ctx.fillStyle=`rgba(255,240,200,${tw*.55})`;
    ctx.beginPath(); ctx.arc(sx,sy,i%7===0?1.6:i%3===0?1:.5,0,Math.PI*2); ctx.fill();
  }

  /* groundY = linha do chГЈo visГӯvel
     PГ©s do sprite (local y вүҲ +58) Г— scale 2.8 = 162px abaixo da Гўncora
     Para pГ©s ficarem em groundY: Гўncora = groundY - 162              */
  const groundY   = H - 48;
  const charAncY  = groundY - 162;
  const haloCol = selectedChar==='female' ? '180,30,100' : '200,40,40';
  const halo=ctx.createRadialGradient(cx,charAncY,0,cx,charAncY,230);
  halo.addColorStop(0,`rgba(${haloCol},0.28)`);
  halo.addColorStop(0.5,`rgba(${haloCol},0.10)`);
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=halo; ctx.fillRect(cx-240,charAncY-180,480,380);

  /* в”Җв”Җ ChГЈo (plataforma estilo FF) в”Җв”Җ */
  /* reflexo */
  ctx.save();
  ctx.translate(cx, groundY+2);
  ctx.scale(1,-0.14);
  ctx.globalAlpha=0.18;
  drawMenuCharacter(0, -162, 2.8, selectedChar);
  ctx.globalAlpha=1;
  ctx.restore();

  /* elipse de luz no chГЈo */
  const ellG=ctx.createRadialGradient(cx,groundY,0,cx,groundY,150);
  ellG.addColorStop(0,`rgba(${haloCol},0.55)`);
  ellG.addColorStop(0.4,`rgba(${haloCol},0.18)`);
  ellG.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ellG;
  ctx.beginPath(); ctx.ellipse(cx,groundY,150,22,0,0,Math.PI*2); ctx.fill();

  /* plataforma вҖ” plano principal */
  const platG=ctx.createLinearGradient(0,groundY-4,0,groundY+30);
  platG.addColorStop(0,'rgba(80,90,120,0.90)');
  platG.addColorStop(0.3,'rgba(40,45,70,0.95)');
  platG.addColorStop(1,'rgba(10,12,24,0.98)');
  ctx.fillStyle=platG; ctx.fillRect(0,groundY-4,W,H-(groundY-4));

  /* linha de borda superior brilhante */
  const lineG=ctx.createLinearGradient(cx-200,0,cx+200,0);
  lineG.addColorStop(0,'rgba(255,255,255,0)');
  lineG.addColorStop(0.3,`rgba(${haloCol},0.9)`);
  lineG.addColorStop(0.5,'rgba(255,255,255,0.95)');
  lineG.addColorStop(0.7,`rgba(${haloCol},0.9)`);
  lineG.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=lineG; ctx.fillRect(0,groundY-4,W,2);

  /* grade de perspectiva no chГЈo */
  ctx.save();
  ctx.globalAlpha=0.12;
  ctx.strokeStyle=`rgb(${haloCol})`;
  ctx.lineWidth=1;
  for(let i=1;i<5;i++){
    const gy=groundY+i*10;
    const xshrink=i*28;
    ctx.beginPath(); ctx.moveTo(xshrink,gy); ctx.lineTo(W-xshrink,gy); ctx.stroke();
  }
  for(let i=0;i<=8;i++){
    const fx=i*(W/8);
    ctx.beginPath(); ctx.moveTo(cx,groundY); ctx.lineTo(fx,groundY+50); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.restore();

  /* в”Җв”Җ Sombra do personagem no chГЈo в”Җв”Җ */
  /* Anima posiГ§ГЈo X do personagem: centro вҶ’ direita quando submenu aberto */
  const targetX = showWeaponMenu ? W * 0.72 : cx;
  charMenuX += (targetX - charMenuX) * 0.10;
  const charSX = charMenuX;

  ctx.fillStyle='rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(charSX,groundY,40,8,0,0,Math.PI*2); ctx.fill();

  /* в”Җв”Җ Personagem в”Җв”Җ */
  drawMenuCharacter(charSX, charAncY + (charSX - cx) * 0.0, 2.8, selectedChar);

  /* в”Җв”Җ TГӯtulo (topo) в”Җв”Җ */
  ctx.textAlign='center';
  const pulse=Math.sin(gf*.05)*8;
  ctx.shadowColor='#F9A825'; ctx.shadowBlur=35+pulse;
  ctx.fillStyle='#F9A825'; ctx.font='bold 48px Arial';
  ctx.fillText('PLATFORM', cx, 62);
  ctx.shadowColor='#EF5350'; ctx.shadowBlur=30+pulse;
  ctx.fillStyle='#EF5350'; ctx.font='bold 48px Arial';
  ctx.fillText('ADVENTURE', cx, 114);
  ctx.shadowBlur=0;

  /* linha decorativa sob tГӯtulo */
  const tl=ctx.createLinearGradient(cx-160,0,cx+160,0);
  tl.addColorStop(0,'rgba(249,168,37,0)');
  tl.addColorStop(0.5,'rgba(249,168,37,0.80)');
  tl.addColorStop(1,'rgba(249,168,37,0)');
  ctx.fillStyle=tl; ctx.fillRect(cx-160,122,320,2);

  ctx.fillStyle='rgba(255,255,255,0.30)'; ctx.font='12px Arial';

  /* в”Җв”Җ BotГЈo JOGAR в”Җв”Җ */
  const pb=getMenuPlayBtn();
  const phov=menuHover===0;

  pbg.addColorStop(1,phov?'rgba(220,80,0,0.55)':'rgba(220,80,0,0.18)');
  ctx.fillStyle=pbg;
  ctx.beginPath(); ctx.roundRect(pb.x,pb.y,pb.w,pb.h,14); ctx.fill();
  ctx.strokeStyle=phov?'#FFD54F':'rgba(249,168,37,0.75)';
  ctx.lineWidth=phov?2.5:2;
  ctx.beginPath(); ctx.roundRect(pb.x,pb.y,pb.w,pb.h,14); ctx.stroke();
  ctx.shadowBlur=0; ctx.lineWidth=1;
  ctx.fillStyle=phov?'#fff':'#F9A825';
  ctx.font=`bold ${phov?26:24}px Arial`;
  ctx.fillText('в–¶  JOGAR', pb.x + pb.w/2, pb.y+pb.h/2+9);

  /* в”Җв”Җ BotГЈo de personagem (canto inferior esquerdo) в”Җв”Җ */

  const cAccent=selectedChar==='female'?'244,143,177':'100,181,246';

  ctx.fillStyle=chov?`rgba(${cAccent},0.22)`:'rgba(255,255,255,0.07)';

  /* mini preview do personagem no botГЈo */

  ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText(selectedChar==='male'?'вҮ„  HeroГӯna':'вҮ„  HerГіi', cb.x+52, cb.y+cb.h/2+5);

  ctx.fillText(selectedChar==='male'?'Personagem: HerГіi':'Personagem: HeroГӯna', cb.x, cb.y-12);

  /* в”Җв”Җ BotГЈo CONQUISTAS в”Җв”Җ */
  const ab = getAchBtn();

  if(ahov){ctx.shadowColor='rgba(255,215,0,0.8)'; ctx.shadowBlur=14;}

  ctx.beginPath(); ctx.roundRect(ab.x,ab.y,ab.w,ab.h,12); ctx.fill();
  ctx.strokeStyle=ahov?'rgba(255,215,0,0.9)':'rgba(255,215,0,0.4)';
  ctx.lineWidth=ahov?2:1.5;
  ctx.beginPath(); ctx.roundRect(ab.x,ab.y,ab.w,ab.h,12); ctx.stroke();
  ctx.shadowBlur=0; ctx.lineWidth=1;
  ctx.fillStyle=ahov?'#FFD700':'rgba(255,215,0,0.8)';
  ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText('рҹҸ…  Conquistas', ab.x+14, ab.y+ab.h/2-4);
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='10px Arial';
  ctx.fillText(`${unlockedAch.size}/${ACHIEVEMENTS.length} desbloqueadas`, ab.x+14, ab.y+ab.h/2+9);

  /* в”Җв”Җ BotГЈo ARMAS (abre submenu) в”Җв”Җ */

  ctx.lineWidth=whov?2:1.5;
  ctx.beginPath(); ctx.roundRect(wb.x,wb.y,wb.w,wb.h,12); ctx.stroke();

  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='10px Arial';

  /* в”Җв”Җ BotГЈo CORES (abre submenu de cores) в”Җв”Җ */

  ctx.beginPath(); ctx.roundRect(colb.x,colb.y,colb.w,colb.h,12); ctx.stroke();

  /* bolinhas de preview das cores */
  const previewKeys = selectedChar==='male' ? ['skin','shirt','pants','hair'] : ['fskin','fshirt','fskirt','fhair'];

    ctx.beginPath(); ctx.arc(colb.x+20+i*14, colb.y+colb.h/2, 5,0,Math.PI*2); ctx.stroke();
  });
  ctx.fillStyle=colhov?'#FFD54F':'rgba(255,220,100,0.85)';
  ctx.font='bold 12px Arial'; ctx.textAlign='left';
  ctx.fillText('рҹҺЁ  Cores', colb.x+78, colb.y+colb.h/2-4);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='10px Arial';
  ctx.fillText('Personalizar aparГӘncia', colb.x+78, colb.y+colb.h/2+9);

  /* в”Җв”Җ BotГЈo LOJA в”Җв”Җ */
  const stb = getStoreBtn();

  ctx.beginPath(); ctx.roundRect(stb.x,stb.y,stb.w,stb.h,12); ctx.stroke();

  drawCoinIcon(stb.x+22, stb.y+stb.h/2, 11);
  ctx.fillStyle=shov?'#FFD700':'rgba(255,215,0,0.85)';

  ctx.fillText('Loja', stb.x+42, stb.y+stb.h/2-4);
  ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='10px Arial';

  /* Dica controles */
  ctx.textAlign='center';

  ctx.fillText('WASD: Mover В· EspaГ§o/W: Pular В· Clique Esq: Atacar В· Clique Dir: Poder В· P/ESC: Pause', cx, H-8);

  /* в”Җв”Җ BotГЈo вҡҷ SOM (canto superior direito) в”Җв”Җ */

  /* в”Җв”Җ Submenus (por cima de tudo) в”Җв”Җ */
  if (showWeaponMenu) drawWeaponSubmenu();
  if (showColorMenu)  drawColorSubmenu();
  if (showStoreMenu)  drawStoreSubmenu();
}

function drawWeaponIcon(cx,cy,id,sz){
  ctx.save(); ctx.translate(cx,cy);
  ctx.lineCap='round'; ctx.lineJoin='round';
  const s=sz;
  if(id==='scythe'){
    /* cabo gradiente */
    const cg=ctx.createLinearGradient(0,s*.5,s*.15,-s*.4);
    cg.addColorStop(0,'#5D4037'); cg.addColorStop(0.5,'#8D6E63'); cg.addColorStop(1,'#4E342E');
    ctx.strokeStyle=cg; ctx.lineWidth=s*.13;
    ctx.beginPath(); ctx.moveTo(0,s*.5); ctx.lineTo(s*.15,-s*.4); ctx.stroke();
    /* detalhes no cabo */
    ctx.strokeStyle='#FFD54F'; ctx.lineWidth=s*.04;
    for(let i=0;i<3;i++){
      const t=i/3; const bx=s*.15*t, by=s*.5-(s*.9*t);
      ctx.beginPath(); ctx.moveTo(bx-s*.05,by+s*.04); ctx.lineTo(bx+s*.05,by-s*.04); ctx.stroke();
    }
    /* lГўmina */
    const lg=ctx.createLinearGradient(s*.15,-s*.4,s*.65,-s*.05);
    lg.addColorStop(0,'#B0BEC5'); lg.addColorStop(0.4,'#ECEFF1'); lg.addColorStop(1,'#607D8B');
    ctx.strokeStyle=lg; ctx.lineWidth=s*.16;
    ctx.beginPath(); ctx.moveTo(s*.15,-s*.4); ctx.bezierCurveTo(s*.65,-s*.78,s*.7,-s*.08,s*.12,-s*.04); ctx.stroke();
    /* fio */
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=s*.05;
    ctx.beginPath(); ctx.moveTo(s*.15,-s*.4); ctx.bezierCurveTo(s*.55,-s*.72,s*.62,-s*.14,s*.12,-s*.05); ctx.stroke();
    /* brilho */
    ctx.fillStyle='rgba(100,180,255,0.3)';
    ctx.beginPath(); ctx.moveTo(s*.15,-s*.4); ctx.bezierCurveTo(s*.4,-s*.6,s*.5,-s*.2,s*.1,-s*.1); ctx.closePath(); ctx.fill();
    /* ponta */
    ctx.fillStyle='#ECEFF1'; ctx.beginPath(); ctx.arc(s*.12,-s*.04,s*.07,0,Math.PI*2); ctx.fill();

  } else if(id==='axe'){
    /* cabo */
    const cg=ctx.createLinearGradient(0,s*.55,s*.05,-s*.35);
    cg.addColorStop(0,'#4E342E'); cg.addColorStop(0.6,'#795548'); cg.addColorStop(1,'#5D4037');
    ctx.strokeStyle=cg; ctx.lineWidth=s*.13;
    ctx.beginPath(); ctx.moveTo(0,s*.55); ctx.lineTo(s*.05,-s*.35); ctx.stroke();
    /* rebites */
    ctx.fillStyle='#FFD54F';
    [[0,s*.3],[s*.02,-s*.05],[s*.04,-s*.28]].forEach(([rx,ry])=>{
      ctx.beginPath(); ctx.arc(rx,ry,s*.065,0,Math.PI*2); ctx.fill();
    });
    /* cabeГ§a */
    const ag=ctx.createLinearGradient(s*.05,-s*.55,s*.55,-s*.05);
    ag.addColorStop(0,'#78909C'); ag.addColorStop(0.45,'#CFD8DC'); ag.addColorStop(1,'#546E7A');
    ctx.fillStyle=ag;
    ctx.beginPath();
    ctx.moveTo(s*.05,-s*.35); ctx.lineTo(s*.05,-s*.55);
    ctx.bezierCurveTo(s*.2,-s*.65,s*.65,-s*.55,s*.6,-s*.32);
    ctx.bezierCurveTo(s*.6,-s*.12,s*.2,-s*.02,s*.05,-s*.08);
    ctx.closePath(); ctx.fill();
    /* fio */
    ctx.strokeStyle='rgba(255,255,255,0.8)'; ctx.lineWidth=s*.06;
    ctx.beginPath(); ctx.moveTo(s*.05,-s*.55); ctx.bezierCurveTo(s*.2,-s*.65,s*.65,-s*.55,s*.6,-s*.32); ctx.stroke();
    /* reflexo */
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath();
    ctx.moveTo(s*.08,-s*.38); ctx.lineTo(s*.08,-s*.5);
    ctx.bezierCurveTo(s*.18,-s*.56,s*.4,-s*.5,s*.4,-s*.36);
    ctx.bezierCurveTo(s*.4,-s*.24,s*.2,-s*.18,s*.08,-s*.22);
    ctx.closePath(); ctx.fill();
    /* sangria */
    ctx.strokeStyle='rgba(60,80,100,0.5)'; ctx.lineWidth=s*.04;
    ctx.beginPath(); ctx.moveTo(s*.32,-s*.52); ctx.lineTo(s*.34,-s*.16); ctx.stroke();

  } else {
    /* ESPADA */
    /* punho */
    const hg=ctx.createLinearGradient(0,s*.6,0,-s*.05);
    hg.addColorStop(0,'#4E342E'); hg.addColorStop(1,'#8D6E63');
    ctx.strokeStyle=hg; ctx.lineWidth=s*.18;
    ctx.beginPath(); ctx.moveTo(0,s*.6); ctx.lineTo(0,-s*.05); ctx.stroke();
    /* gema */
    ctx.fillStyle='#E53935'; ctx.beginPath(); ctx.arc(0,s*.22,s*.1,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,160,160,0.7)'; ctx.beginPath(); ctx.arc(-s*.03,s*.19,s*.04,0,Math.PI*2); ctx.fill();
    /* guarda */
    const gg=ctx.createLinearGradient(-s*.42,-s*.05,s*.42,-s*.05);
    gg.addColorStop(0,'#F57F17'); gg.addColorStop(0.5,'#FFD54F'); gg.addColorStop(1,'#F57F17');
    ctx.strokeStyle=gg; ctx.lineWidth=s*.16;
    ctx.beginPath(); ctx.moveTo(-s*.42,-s*.05); ctx.lineTo(s*.42,-s*.05); ctx.stroke();
    ctx.fillStyle='#FFD54F';
    ctx.beginPath(); ctx.arc(-s*.42,-s*.05,s*.09,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(s*.42,-s*.05,s*.09,0,Math.PI*2); ctx.fill();
    /* lГўmina */
    const sg=ctx.createLinearGradient(-s*.12,-s*.05,s*.12,-s*.65);
    sg.addColorStop(0,'#90A4AE'); sg.addColorStop(0.5,'#ECEFF1'); sg.addColorStop(1,'#B0BEC5');
    ctx.fillStyle=sg;
    ctx.beginPath(); ctx.moveTo(-s*.12,-s*.05); ctx.lineTo(s*.12,-s*.05); ctx.lineTo(0,-s*.7); ctx.closePath(); ctx.fill();
    /* fio */
    ctx.strokeStyle='rgba(255,255,255,0.85)'; ctx.lineWidth=s*.03;
    ctx.beginPath(); ctx.moveTo(s*.01,-s*.05); ctx.lineTo(0,-s*.7); ctx.stroke();
    ctx.strokeStyle='rgba(180,220,255,0.45)'; ctx.lineWidth=s*.03;
    ctx.beginPath(); ctx.moveTo(-s*.06,-s*.08); ctx.lineTo(-s*.04,-s*.62); ctx.stroke();
  }
  ctx.restore();
}

function drawWeaponBtns(){

function drawColorSubmenu() {
  const layout = getColorSubmenuLayout();
  const {panel, rows} = layout;
  const W=canvas.width, H=canvas.height;

  /* overlay escuro */
  ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);

  /* painel */
  const panG=ctx.createLinearGradient(panel.x,panel.y,panel.x,panel.y+panel.h);
  panG.addColorStop(0,'rgba(20,24,48,0.98)'); panG.addColorStop(1,'rgba(8,10,24,0.98)');
  ctx.fillStyle=panG; ctx.beginPath(); ctx.roundRect(panel.x,panel.y,panel.w,panel.h,16); ctx.fill();
  ctx.strokeStyle='rgba(160,120,255,0.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(panel.x,panel.y,panel.w,panel.h,16); ctx.stroke();
  ctx.lineWidth=1;

  /* tГӯtulo */
  ctx.textAlign='center';
  ctx.fillStyle='rgba(180,140,255,0.9)'; ctx.font='bold 15px Arial';
  ctx.fillText('рҹҺЁ  Personalizar Cores', panel.x+panel.w/2, panel.y+28);

  /* linha divisГіria */
  ctx.strokeStyle='rgba(160,120,255,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(panel.x+20,panel.y+38); ctx.lineTo(panel.x+panel.w-20,panel.y+38); ctx.stroke();

  /* linhas de cor */
  const swSize = 30, swGap = 8, cols = 6;
  const rowH = 72;
  rows.forEach((row, ri) => {
    const ry = panel.y + 52 + ri * rowH;
    /* label da categoria */
    ctx.fillStyle='rgba(255,255,255,0.75)'; ctx.font='bold 11px Arial';
    ctx.textAlign='left';
    ctx.fillText(row.label, panel.x+20, ry+14);
    /* swatches */
    const opts = COLOR_OPTIONS[row.key] || [];
    opts.forEach((col, ci) => {
      const sx = panel.x + 20 + ci*(swSize+swGap);
      const sy = ry + 22;
      const selected = PLAYER_COLORS[row.key] === col;
      /* borda de seleГ§ГЈo */
      if(selected){
        ctx.strokeStyle='#fff'; ctx.lineWidth=2.5;
        ctx.beginPath(); ctx.roundRect(sx-2,sy-2,swSize+4,swSize+4,8); ctx.stroke();
        ctx.lineWidth=1;
      }
      /* swatch */
      ctx.fillStyle=col;
      ctx.beginPath(); ctx.roundRect(sx,sy,swSize,swSize,6); ctx.fill();
      /* highlight */
      ctx.fillStyle='rgba(255,255,255,0.18)';
      ctx.beginPath(); ctx.roundRect(sx,sy,swSize,swSize/2,6); ctx.fill();
      /* hover check via mouseX/Y */
      if(typeof mouseX!=='undefined' && mouseX>=sx && mouseX<=sx+swSize && mouseY>=sy && mouseY<=sy+swSize){
        ctx.strokeStyle='rgba(255,255,100,0.9)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.roundRect(sx-1,sy-1,swSize+2,swSize+2,7); ctx.stroke();
        ctx.lineWidth=1;
      }
    });
  });

  /* botГЈo fechar */
  const bw=120,bh=36,bx=panel.x+(panel.w-bw)/2,by=panel.y+panel.h-52;
  const bhov = typeof mouseX!=='undefined' && mouseX>=bx && mouseX<=bx+bw && mouseY>=by && mouseY<=by+bh;
  ctx.fillStyle=bhov?'rgba(255,100,100,0.3)':'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.fill();
  ctx.strokeStyle=bhov?'rgba(255,120,120,0.9)':'rgba(255,255,255,0.3)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,10); ctx.stroke();
  ctx.fillStyle=bhov?'#fff':'rgba(255,255,255,0.7)'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
  ctx.fillText('вң–  Fechar', bx+bw/2, by+bh/2+5);
  ctx.lineWidth=1; ctx.textAlign='left';
}

function drawAchievementsScreen() {
  const W=canvas.width, H=canvas.height, cx=W/2;

  /* fundo */
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#08001a'); bg.addColorStop(1,'#180030');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  for(let i=0;i<60;i++){
    const sx=((i*179+gf*0.15)%W+W)%W, sy=((i*113)%H+H)%H;
    ctx.fillStyle=`rgba(255,255,255,${0.15+((i%4)/4)*0.4})`;
    ctx.beginPath(); ctx.arc(sx,sy,0.8,0,Math.PI*2); ctx.fill();
  }

  /* tГӯtulo fixo */
  ctx.textAlign='center';
  ctx.shadowColor='#FFD700'; ctx.shadowBlur=24;
  ctx.fillStyle='#FFD700'; ctx.font='bold 28px Arial';
  ctx.fillText('рҹҸ…  CONQUISTAS', cx, 46);
  ctx.shadowBlur=0;

  const total=ACHIEVEMENTS.length, done=unlockedAch.size;
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='12px Arial';
  ctx.fillText(`${done} / ${total} desbloqueadas`, cx, 66);

  const bpw=300, bph=8, bpx=cx-bpw/2, bpy=74;
  ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(bpx,bpy,bpw,bph);
  const pg=ctx.createLinearGradient(bpx,0,bpx+bpw,0);
  pg.addColorStop(0,'#FFD700'); pg.addColorStop(1,'#FF8C00');
  ctx.fillStyle=pg; ctx.fillRect(bpx,bpy,bpw*(done/total),bph);
  ctx.strokeStyle='rgba(255,215,0,0.4)'; ctx.lineWidth=1;
  ctx.strokeRect(bpx,bpy,bpw,bph);

  /* ГЎrea scrollГЎvel */
  const SCROLL_TOP = 92, SCROLL_BOT = H - 54;
  const SCROLL_H   = SCROLL_BOT - SCROLL_TOP;
  const cols=2, cw=(W-80)/cols, ch=60, gap=8;
  const rows=Math.ceil(ACHIEVEMENTS.length/cols);
  const contentH = rows*(ch+gap);
  const maxScroll = Math.max(0, contentH - SCROLL_H + 10);
  achScrollY = Math.max(0, Math.min(achScrollY, maxScroll));

  /* clip na ГЎrea de conteГәdo */
  ctx.save();
  ctx.beginPath(); ctx.rect(0, SCROLL_TOP, W, SCROLL_H); ctx.clip();

  ACHIEVEMENTS.forEach((a,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const ax=40+col*(cw+gap);
    const ay=SCROLL_TOP + row*(ch+gap) - achScrollY;
    if (ay+ch < SCROLL_TOP || ay > SCROLL_BOT) return; /* fora da vista */
    const unlocked=unlockedAch.has(a.id);
    ctx.fillStyle=unlocked?'rgba(255,215,0,0.09)':'rgba(255,255,255,0.03)';
    ctx.beginPath(); ctx.roundRect(ax,ay,cw,ch,8); ctx.fill();
    ctx.strokeStyle=unlocked?'rgba(255,215,0,0.55)':'rgba(255,255,255,0.1)';
    ctx.lineWidth=unlocked?1.5:1;
    ctx.beginPath(); ctx.roundRect(ax,ay,cw,ch,8); ctx.stroke();
    ctx.lineWidth=1;
    ctx.globalAlpha=unlocked?1:0.28;
    ctx.font='20px Arial'; ctx.textAlign='center';
    ctx.fillText(a.icon, ax+26, ay+ch/2+7);
    ctx.textAlign='left';
    ctx.fillStyle=unlocked?'#FFD700':'rgba(255,255,255,0.35)';
    ctx.font='bold 11px Arial';
    ctx.fillText(a.name, ax+50, ay+ch/2-3);
    ctx.fillStyle=unlocked?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.2)';
    ctx.font='10px Arial';
    ctx.fillText(a.desc, ax+50, ay+ch/2+12);
    if(unlocked){
      ctx.fillStyle='rgba(255,215,0,0.8)'; ctx.font='bold 10px Arial'; ctx.textAlign='right';
      ctx.fillText('вң”', ax+cw-10, ay+13);
    }
    ctx.globalAlpha=1;
  });

  ctx.restore(); /* remove clip */

  /* sombra nos bordos para indicar scroll */
  if (achScrollY > 0) {
    const grad=ctx.createLinearGradient(0,SCROLL_TOP,0,SCROLL_TOP+30);
    grad.addColorStop(0,'rgba(8,0,26,0.8)'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.fillRect(0,SCROLL_TOP,W,30);
  }
  if (achScrollY < maxScroll) {
    const grad=ctx.createLinearGradient(0,SCROLL_BOT-30,0,SCROLL_BOT);
    grad.addColorStop(0,'transparent'); grad.addColorStop(1,'rgba(8,0,26,0.8)');
    ctx.fillStyle=grad; ctx.fillRect(0,SCROLL_BOT-30,W,30);
    /* seta "rolar para baixo" */
    ctx.fillStyle='rgba(255,215,0,0.6)'; ctx.font='14px Arial'; ctx.textAlign='center';
    ctx.fillText('в–ј  role para ver mais', cx, SCROLL_BOT-4);
  }

  /* scrollbar lateral */
  if (maxScroll > 0) {
    const sbH = Math.max(30, SCROLL_H*(SCROLL_H/contentH));
    const sbY = SCROLL_TOP + (achScrollY/maxScroll)*(SCROLL_H-sbH);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(W-10, SCROLL_TOP, 6, SCROLL_H);
    ctx.fillStyle='rgba(255,215,0,0.5)';
    ctx.beginPath(); ctx.roundRect(W-10, sbY, 6, sbH, 3); ctx.fill();
  }

  /* botГЈo voltar fixo */
  const bvx=cx-90, bvy=H-48, bvw=180, bvh=36;
  const bhov=mouseX>=bvx&&mouseX<=bvx+bvw&&mouseY>=bvy&&mouseY<=bvy+bvh;
  ctx.fillStyle=bhov?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.07)';
  ctx.beginPath(); ctx.roundRect(bvx,bvy,bvw,bvh,10); ctx.fill();
  ctx.strokeStyle=bhov?'rgba(255,255,255,0.5)':'rgba(255,255,255,0.2)';
  ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(bvx,bvy,bvw,bvh,10); ctx.stroke(); ctx.lineWidth=1;
  ctx.fillStyle=bhov?'#fff':'rgba(255,255,255,0.6)'; ctx.font='bold 13px Arial'; ctx.textAlign='center';
  ctx.fillText('вҶҗ VOLTAR AO MENU', cx, bvy+bvh/2+5);
  ctx.textAlign='left';
}

function drawDifficultyScreen() {

  ctx.fillStyle='#fff'; ctx.font='bold 36px Arial';

  ctx.fillText('Escolha o nГӯvel de desafio antes de comeГ§ar', cx, H/2-96);

  /* botГөes */
  const btns = getDiffBtns();
  const keys3 = ['easy','normal','hard'];
  for (const b of btns) {
    if (b.id === 'back') {
      /* botГЈo voltar */
      const hov = mouseX>=b.x&&mouseX<=b.x+b.w&&mouseY>=b.y&&mouseY<=b.y+b.h;
      ctx.fillStyle = hov ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.06)';
      ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,10); ctx.fill();
      ctx.strokeStyle = hov ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
      ctx.lineWidth=1.5; ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,10); ctx.stroke(); ctx.lineWidth=1;
      ctx.fillStyle=hov?'#fff':'rgba(255,255,255,0.5)'; ctx.font='bold 14px Arial';
      ctx.fillText('вҶҗ VOLTAR', cx, b.y+b.h/2+5);
      continue;
    }
    const cfg = DIFF_CONFIG[b.id];
    const sel = difficulty === b.id;
    const hov = mouseX>=b.x&&mouseX<=b.x+b.w&&mouseY>=b.y&&mouseY<=b.y+b.h;

    /* sombra colorida */
    if (sel||hov) { ctx.shadowColor=cfg.color; ctx.shadowBlur=sel?22:12; }
    /* fundo */
    ctx.fillStyle = sel ? `${cfg.color}33` : hov ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.04)';
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,14); ctx.fill();
    /* borda */
    ctx.strokeStyle = sel ? cfg.color : hov ? `${cfg.color}99` : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = sel ? 2.5 : 1.5;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,b.w,b.h,14); ctx.stroke();
    ctx.shadowBlur=0; ctx.lineWidth=1;

    /* Гӯcone */
    const icons = { easy:'рҹҢҝ', normal:'вҡ”пёҸ', hard:'рҹ’Җ' };
    ctx.font='28px Arial'; ctx.textAlign='center';
    ctx.fillText(icons[b.id], b.x+44, b.y+b.h/2+10);

    /* label */
    ctx.fillStyle = sel ? cfg.color : hov ? '#fff' : 'rgba(255,255,255,0.8)';
    ctx.font=`bold ${sel?20:18}px Arial`; ctx.textAlign='left';
    ctx.fillText(cfg.label, b.x+76, b.y+b.h/2-6);

    /* descriГ§ГЈo */
    ctx.fillStyle=`${cfg.color}cc`; ctx.font='12px Arial';
    ctx.fillText(cfg.desc, b.x+76, b.y+b.h/2+12);

    /* HP e multiplicadores вҖ” linha separada abaixo */
    ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='10px Arial';
    ctx.fillText(`HP: ${cfg.playerHp}  |  DMG Г—${cfg.dmgMult}  |  SPD Г—${cfg.spdMult}`, b.x+76, b.y+b.h/2+27);

    /* check mark se selecionado */
    if (sel) {
      ctx.fillStyle=cfg.color; ctx.font='bold 16px Arial'; ctx.textAlign='right';
      ctx.fillText('вң”', b.x+b.w-12, b.y+b.h/2-4);
    }
  }
  ctx.textAlign='left';
}

function drawGameOverScreen(){
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;

  /* Overlay */
  ctx.fillStyle='rgba(0,0,0,0.82)';
  ctx.fillRect(0,0,W,H);

  /* TГӯtulo */
  ctx.textAlign='center';
  ctx.shadowColor='#EF5350'; ctx.shadowBlur=50;
  ctx.fillStyle='#EF5350'; ctx.font='bold 74px Arial';
  ctx.fillText('GAME OVER', cx, cy - 50);
  ctx.shadowBlur=0;

  /* Fase e pontuaГ§ГЈo */
  const phaseNames=['Floresta','Caverna','Castelo em Chamas','Tundra Gelada','EspaГ§o Sideral'];
  ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font='16px Arial';
  ctx.fillText(`Morreu na Fase ${currentPhase+1} вҖ” ${phaseNames[currentPhase]||''}`, cx, cy+5);
  ctx.fillStyle='#F9A825'; ctx.font='bold 24px Arial';
  ctx.fillText(`PontuaГ§ГЈo: ${score}`, cx, cy+38);

  /* BotГөes */
  const rects = getGoBtnRects();
  rects.forEach((b, i) => {
    const hover = goHover === i;
    if (hover) { ctx.shadowColor='#F9A825'; ctx.shadowBlur=14; }

    ctx.fillStyle = hover
      ? (i===1 ? 'rgba(239,83,80,0.28)' : 'rgba(102,187,106,0.28)')
      : 'rgba(255,255,255,0.07)';
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 13); ctx.fill();

    ctx.strokeStyle = i===1
      ? (hover ? '#EF5350' : 'rgba(239,83,80,0.50)')
      : (hover ? '#66BB6A' : 'rgba(102,187,106,0.50)');
    ctx.lineWidth = hover ? 2.5 : 1.8;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 13); ctx.stroke();
    ctx.shadowBlur=0; ctx.lineWidth=1;

    ctx.fillStyle = i===1
      ? (hover ? '#FF5252' : '#EF9A9A')
      : (hover ? '#A5D6A7' : '#81C784');
    ctx.font = `bold ${hover?17:16}px Arial`;
    ctx.fillText(b.label, cx, b.y + b.h/2 + 6);
  });

  ctx.fillStyle='rgba(255,255,255,0.22)'; ctx.font='12px Arial';
  ctx.fillText('Clique ou pressione R para tentar novamente', cx, rects[rects.length-1].y + GO_BH + 26);
  ctx.textAlign='left';
}
function drawWinScreen(){
  ctx.fillStyle='rgba(0,0,20,.88)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<90;i++){ctx.fillStyle=`rgba(255,255,200,${Math.random()*.8+.2})`;ctx.fillRect(Math.random()*canvas.width,Math.random()*canvas.height,2,2);}
  ctx.textAlign='center';
  ctx.shadowColor='#F9A825'; ctx.shadowBlur=55;
  ctx.fillStyle='#F9A825'; ctx.font='bold 72px Arial'; ctx.fillText('VOCГҠ VENCEU!',canvas.width/2,canvas.height/2-55);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='bold 30px Arial'; ctx.fillText(`PontuaГ§ГЈo Total: ${score}`,canvas.width/2,canvas.height/2+15);
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='20px Arial';
  ctx.fillText(`Todas as ${PHASES.length} fases concluГӯdas! ParabГ©ns!`,canvas.width/2,canvas.height/2+58);
  ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='18px Arial';
  ctx.fillText('R ou Clique para reiniciar',canvas.width/2,canvas.height/2+100);
  ctx.textAlign='left';
}

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   MAIN LOOP
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
buildBG(PHASES[0]);

/* в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
   SETTINGS PANEL вҖ” sliders & mute
в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
const settingsPanel = document.getElementById('settingsPanel');
const panelClose    = document.getElementById('panelClose');
const slMusic       = document.getElementById('slMusic');
const slSfx         = document.getElementById('slSfx');
const lblMusic      = document.getElementById('lblMusic');
const lblSfx        = document.getElementById('lblSfx');
const btnMuteMusic  = document.getElementById('btnMuteMusic');
const btnMuteSfx    = document.getElementById('btnMuteSfx');

let mutedMusic = false;
let mutedSfx   = false;
let justOpenedSettings = false;

function updateSliderTrack(el) {
  el.style.setProperty('--pct', el.value + '%');
}
function applyMusicVol() { if (musicGain) musicGain.gain.value = mutedMusic ? 0 : volMusic; }
function applySfxVol()   { if (sfxGain)   sfxGain.gain.value   = mutedSfx   ? 0 : volSfx;  }

// Close button inside panel
panelClose.addEventListener('click', e => {
  e.stopPropagation();
  settingsOpen = false;
  settingsPanel.classList.remove('open');
});

// Stop panel clicks from bubbling (prevents accidental game actions)
settingsPanel.addEventListener('mousedown', e => e.stopPropagation());
settingsPanel.addEventListener('click',     e => e.stopPropagation());

// Close panel on click anywhere outside panel
document.addEventListener('click', () => {
  if (justOpenedSettings) { justOpenedSettings = false; return; }
  if (settingsOpen) {
    settingsOpen = false;
    settingsPanel.classList.remove('open');
  }
});

// Music slider
slMusic.addEventListener('input', () => {
  volMusic = slMusic.value / 100;
  lblMusic.textContent = slMusic.value + '%';
  updateSliderTrack(slMusic);
  mutedMusic = false;
  btnMuteMusic.classList.remove('muted');
  btnMuteMusic.textContent = 'рҹ”Ү Mutar MГәsica';
  applyMusicVol();
});

// SFX slider
slSfx.addEventListener('input', () => {
  volSfx = slSfx.value / 100;
  lblSfx.textContent = slSfx.value + '%';
  updateSliderTrack(slSfx);
  mutedSfx = false;
  btnMuteSfx.classList.remove('muted');
  btnMuteSfx.textContent = 'рҹ”Ү Mutar Efeitos';
  applySfxVol();
});

// Mute music
btnMuteMusic.addEventListener('click', () => {
  mutedMusic = !mutedMusic;
  btnMuteMusic.classList.toggle('muted', mutedMusic);
  btnMuteMusic.textContent = mutedMusic ? 'рҹ”Ҡ Ativar MГәsica' : 'рҹ”Ү Mutar MГәsica';
  applyMusicVol();
});

// Mute SFX
btnMuteSfx.addEventListener('click', () => {
  mutedSfx = !mutedSfx;
  btnMuteSfx.classList.toggle('muted', mutedSfx);
  btnMuteSfx.textContent = mutedSfx ? 'рҹ”Ҡ Ativar Efeitos' : 'рҹ”Ү Mutar Efeitos';
  applySfxVol();
});

// Init slider fill
updateSliderTrack(slMusic);
updateSliderTrack(slSfx);

function loop(){
  gf++;
  if (gameState !== 'paused') update();

  // Screen shake
  const sx=shakeTimer>0?(Math.random()*8-4):0;
  const sy=shakeTimer>0?(Math.random()*6-3):0;
  ctx.save();
  if(shakeTimer>0) ctx.translate(sx,sy);

  drawBG();
  drawPlatforms();
  drawFlag();
  for(const e of enemies) drawEnemy(e);
  drawPowerRings();
  drawArrows();
  drawPlayer();
  drawParticles();
  drawDroppedCoins();
  drawFloatTexts();

  ctx.restore();

  if(gameState==='playing')    drawHUD();
  if(gameState==='paused')     { drawHUD(); drawPauseScreen(); }
  if(gameState==='menu')       drawMenuScreen();
  if(gameState==='difficulty') drawDifficultyScreen();
  if(gameState==='achievements') drawAchievementsScreen();
  if(gameState==='start')      drawStartScreen();
  /* toasts de conquistas вҖ” aparecem em qualquer estado exceto menu */
  drawAchToasts();
  if(gameState==='nextlevel')  drawNextLevelScreen();
  if(gameState==='gameover')   drawGameOverScreen();
  if(gameState==='win')        drawWinScreen();
  requestAnimationFrame(loop);
}
loop();

/* Inicia ГЎudio na PRIMEIRA interaГ§ГЈo вҖ” polГӯtica de autoplay dos navegadores */
(function(){
  function onFirstInteraction(){
    document.removeEventListener('click',     onFirstInteraction);
    document.removeEventListener('keydown',   onFirstInteraction);
    document.removeEventListener('touchstart',onFirstInteraction);
    initAudio();
    syncAudioGains();
    /* sempre inicia a mГәsica do menu вҖ” se o jogo jГЎ tiver iniciado,
       a mГәsica de fase vai sobrescrever logo em seguida */
    startMusic(5);
  }
  document.addEventListener('mousedown',  onFirstInteraction, { once: true });
  document.addEventListener('keydown',    onFirstInteraction, { once: true });
  document.addEventListener('touchstart', onFirstInteraction, { once: true });
})();

/* в”Җв”Җ Tela Cheia в”Җв”Җ */
(function(){
  const btn = document.getElementById('fullscreenBtn');

  function isFS(){
    return !!(document.fullscreenElement || document.webkitFullscreenElement);
  }

  function toggleFS(){
    if(isFS()){
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      const el = document.documentElement;
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    }
  }

  btn.addEventListener('click', toggleFS);

  /* tecla F para tela cheia */
  document.addEventListener('keydown', e=>{
    if(e.code==='KeyF' && !e.ctrlKey && !e.altKey) toggleFS();
  });

  /* atualiza Гӯcone */
  document.addEventListener('fullscreenchange',       updateIcon);
  document.addEventListener('webkitfullscreenchange', updateIcon);
  function updateIcon(){ btn.textContent = isFS() ? 'вң•' : 'вӣ¶'; }
})();
</script>
